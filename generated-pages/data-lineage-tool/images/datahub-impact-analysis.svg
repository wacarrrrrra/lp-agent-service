<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" role="img">
  <title>DataHub Impact Analysis — Multi-Hop Lineage Visualization</title>
  <desc>Architecture diagram showing DataHub's impact analysis capability: a source dataset triggers downstream lineage traversal across 247 datasets, 15 dashboards, and 8 ML models through multi-hop column-level dependency paths.</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Castoro&amp;family=Geist:wght@300;400;500;600&amp;display=swap');
    </style>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3CBBEB"/>
    </marker>
    <marker id="arrow-blue-sm" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#3CBBEB"/>
    </marker>
    <marker id="arrow-mid" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A4170"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="100%" height="100%" fill="#F2F1EE"/>

  <!-- Outer frame -->
  <rect x="20" y="20" width="920" height="640" rx="10" ry="10" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.5"/>

  <!-- Header band -->
  <rect x="20" y="20" width="920" height="64" rx="10" ry="10" fill="#002131"/>
  <rect x="20" y="64" width="920" height="20" fill="#002131"/>

  <!-- Header text -->
  <text x="48" y="58" font-family="'Castoro', Georgia, serif" font-size="22" fill="#FFFFFF" font-weight="400">Impact Analysis</text>
  <text x="48" y="76" font-family="'Geist', sans-serif" font-size="11" fill="#3CBBEB" font-weight="400" letter-spacing="1.5">MULTI-HOP LINEAGE TRAVERSAL — UP TO 1000 HOPS DOWNSTREAM</text>
  <text x="820" y="58" font-family="'Geist', sans-serif" font-size="11" fill="#B0EAFC" font-weight="400" text-anchor="middle">Apache 2.0 Open Source</text>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- ROW LABELS (left margin) -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <text x="36" y="175" font-family="'Geist', sans-serif" font-size="9" fill="#767473" font-weight="400" letter-spacing="1" transform="rotate(-90,36,175)" text-anchor="middle">HOP 1</text>
  <text x="36" y="330" font-family="'Geist', sans-serif" font-size="9" fill="#767473" font-weight="400" letter-spacing="1" transform="rotate(-90,36,330)" text-anchor="middle">HOP 2</text>
  <text x="36" y="490" font-family="'Geist', sans-serif" font-size="9" fill="#767473" font-weight="400" letter-spacing="1" transform="rotate(-90,36,490)" text-anchor="middle">HOP 3</text>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- SOURCE DATASET — center top -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <g id="source-dataset">
    <rect x="370" y="108" width="220" height="72" rx="8" ry="8" fill="#002131" stroke="#3CBBEB" stroke-width="2"/>
    <!-- icon: database -->
    <rect x="388" y="122" width="22" height="16" rx="3" ry="3" fill="none" stroke="#3CBBEB" stroke-width="1.5"/>
    <ellipse cx="399" cy="122" rx="11" ry="4" fill="none" stroke="#3CBBEB" stroke-width="1.5"/>
    <ellipse cx="399" cy="138" rx="11" ry="4" fill="none" stroke="#3CBBEB" stroke-width="1.5"/>
    <text x="420" y="136" font-family="'Geist', sans-serif" font-size="13" fill="#FFFFFF" font-weight="600">orders_raw</text>
    <text x="420" y="151" font-family="'Geist', sans-serif" font-size="10" fill="#B0EAFC" font-weight="400">Snowflake · source dataset</text>
    <!-- schema change badge -->
    <rect x="500" y="110" width="86" height="18" rx="4" ry="4" fill="#0A4170"/>
    <text x="543" y="122" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB" font-weight="500" text-anchor="middle" letter-spacing="0.5">SCHEMA CHANGE</text>
  </g>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- HOP 1 ROW — three downstream datasets -->
  <!-- ─────────────────────────────────────────────────────────── -->

  <!-- Connector: source → hop1-left -->
  <path d="M 430 180 L 430 196 L 210 196 L 210 212" stroke="#3CBBEB" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="5 3"/>
  <!-- Connector: source → hop1-center -->
  <path d="M 480 180 L 480 212" stroke="#3CBBEB" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <!-- Connector: source → hop1-right -->
  <path d="M 530 180 L 530 196 L 750 196 L 750 212" stroke="#3CBBEB" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="5 3"/>

  <!-- HOP 1 LEFT: orders_enriched -->
  <g id="hop1-left">
    <rect x="120" y="212" width="180" height="64" rx="6" ry="6" fill="#0A4170" stroke="#3CBBEB" stroke-width="1.5"/>
    <!-- table icon -->
    <rect x="136" y="226" width="18" height="14" rx="2" ry="2" fill="none" stroke="#B0EAFC" stroke-width="1.4"/>
    <line x1="136" y1="231" x2="154" y2="231" stroke="#B0EAFC" stroke-width="1"/>
    <line x1="136" y1="235" x2="154" y2="235" stroke="#B0EAFC" stroke-width="1"/>
    <text x="162" y="236" font-family="'Geist', sans-serif" font-size="11" fill="#FFFFFF" font-weight="600">orders_enriched</text>
    <text x="162" y="250" font-family="'Geist', sans-serif" font-size="9" fill="#B0EAFC" font-weight="400">dbt model · 3 cols affected</text>
    <text x="136" y="268" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB" font-weight="400">↳ order_id, customer_id, amount</text>
  </g>

  <!-- HOP 1 CENTER: orders_daily_agg -->
  <g id="hop1-center">
    <rect x="370" y="212" width="220" height="64" rx="6" ry="6" fill="#0A4170" stroke="#3CBBEB" stroke-width="1.5"/>
    <rect x="386" y="226" width="18" height="14" rx="2" ry="2" fill="none" stroke="#B0EAFC" stroke-width="1.4"/>
    <line x1="386" y1="231" x2="404" y2="231" stroke="#B0EAFC" stroke-width="1"/>
    <line x1="386" y1="235" x2="404" y2="235" stroke="#B0EAFC" stroke-width="1"/>
    <text x="412" y="236" font-family="'Geist', sans-serif" font-size="11" fill="#FFFFFF" font-weight="600">orders_daily_agg</text>
    <text x="412" y="250" font-family="'Geist', sans-serif" font-size="9" fill="#B0EAFC" font-weight="400">BigQuery · 5 cols affected</text>
    <text x="386" y="268" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB" font-weight="400">↳ date, revenue, order_count +2</text>
  </g>

  <!-- HOP 1 RIGHT: customer_orders -->
  <g id="hop1-right">
    <rect x="660" y="212" width="180" height="64" rx="6" ry="6" fill="#0A4170" stroke="#3CBBEB" stroke-width="1.5"/>
    <rect x="676" y="226" width="18" height="14" rx="2" ry="2" fill="none" stroke="#B0EAFC" stroke-width="1.4"/>
    <line x1="676" y1="231" x2="694" y2="231" stroke="#B0EAFC" stroke-width="1"/>
    <line x1="676" y1="235" x2="694" y2="235" stroke="#B0EAFC" stroke-width="1"/>
    <text x="702" y="236" font-family="'Geist', sans-serif" font-size="11" fill="#FFFFFF" font-weight="600">customer_orders</text>
    <text x="702" y="250" font-family="'Geist', sans-serif" font-size="9" fill="#B0EAFC" font-weight="400">Redshift · 2 cols affected</text>
    <text x="676" y="268" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB" font-weight="400">↳ customer_id, total_spend</text>
  </g>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- HOP 2 ROW -->
  <!-- ─────────────────────────────────────────────────────────── -->

  <!-- Connectors hop1 → hop2 -->
  <path d="M 210 276 L 210 292 L 160 292 L 160 356" stroke="#3CBBEB" stroke-width="1.4" fill="none" marker-end="url(#arrow-blue-sm)"/>
  <path d="M 210 276 L 210 292 L 310 292 L 310 356" stroke="#3CBBEB" stroke-width="1.4" fill="none" marker-end="url(#arrow-blue-sm)"/>
  <path d="M 480 276 L 480 356" stroke="#3CBBEB" stroke-width="1.4" fill="none" marker-end="url(#arrow-blue-sm)"/>
  <path d="M 750 276 L 750 292 L 660 292 L 660 356" stroke="#3CBBEB" stroke-width="1.4" fill="none" marker-end="url(#arrow-blue-sm)"/>
  <path d="M 750 276 L 750 292 L 820 292 L 820 356" stroke="#3CBBEB" stroke-width="1.4" fill="none" marker-end="url(#arrow-blue-sm)"/>

  <!-- HOP 2 — revenue_report (from enriched) -->
  <g id="hop2-a">
    <rect x="90" y="356" width="150" height="58" rx="6" ry="6" fill="#F2F1EE" stroke="#0A4170" stroke-width="1.5"/>
    <!-- chart icon -->
    <rect x="104" y="368" width="16" height="12" rx="2" ry="2" fill="none" stroke="#0A4170" stroke-width="1.4"/>
    <line x1="107" y1="376" x2="107" y2="380" stroke="#0A4170" stroke-width="1.2"/>
    <line x1="111" y1="373" x2="111" y2="380" stroke="#0A4170" stroke-width="1.2"/>
    <line x1="115" y1="370" x2="115" y2="380" stroke="#0A4170" stroke-width="1.2"/>
    <text x="126" y="376" font-family="'Geist', sans-serif" font-size="10" fill="#1E1E1E" font-weight="600">revenue_report</text>
    <text x="104" y="390" font-family="'Geist', sans-serif" font-size="9" fill="#767473" font-weight="400">Looker dashboard</text>
    <text x="104" y="404" font-family="'Geist', sans-serif" font-size="9" fill="#0A4170" font-weight="500">⚠ 2 tiles impacted</text>
  </g>

  <!-- HOP 2 — orders_ml_features (from enriched) -->
  <g id="hop2-b">
    <rect x="258" y="356" width="150" height="58" rx="6" ry="6" fill="#F2F1EE" stroke="#0A4170" stroke-width="1.5"/>
    <!-- ML icon -->
    <circle cx="274" cy="374" r="7" fill="none" stroke="#0A4170" stroke-width="1.4"/>
    <line x1="274" y1="367" x2="274" y2="381" stroke="#0A4170" stroke-width="1"/>
    <line x1="267" y1="374" x2="281" y2="374" stroke="#0A4170" stroke-width="1"/>
    <text x="288" y="376" font-family="'Geist', sans-serif" font-size="10" fill="#1E1E1E" font-weight="600">orders_ml_features</text>
    <text x="266" y="390" font-family="'Geist', sans-serif" font-size="9" fill="#767473" font-weight="400">SageMaker feature store</text>
    <text x="266" y="404" font-family="'Geist', sans-serif" font-size="9" fill="#0A4170" font-weight="500">⚠ 4 features impacted</text>
  </g>

  <!-- HOP 2 — exec_summary (from daily_agg) -->
  <g id="hop2-c">
    <rect x="400" y="356" width="160" height="58" rx="6" ry="6" fill="#F2F1EE" stroke="#0A4170" stroke-width="1.5"/>
    <rect x="416" y="368" width="16" height="12" rx="2" ry="2" fill="none" stroke="#0A4170" stroke-width="1.4"/>
    <line x1="419" y1="376" x2="419" y2="380" stroke="#0A4170" stroke-width="1.2"/>
    <line x1="423" y1="373" x2="423" y2="380" stroke="#0A4170" stroke-width="1.2"/>
    <line x1="427" y1="370" x2="427" y2="380" stroke="#0A4170" stroke-width="1.2"/>
    <text x="440" y="376" font-family="'Geist', sans-serif" font-size="10" fill="#1E1E1E" font-weight="600">exec_summary</text>
    <text x="416" y="390" font-family="'Geist', sans-serif" font-size="9" fill="#767473" font-weight="400">Tableau workbook</text>
    <text x="416" y="404" font-family="'Geist', sans-serif" font-size="9" fill="#0A4170" font-weight="500">⚠ 6 sheets impacted</text>
  </g>

  <!-- HOP 2 — churn_model (from customer_orders) -->
  <g id="hop2-d">