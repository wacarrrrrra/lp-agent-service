  <text x="100" y="502" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Looker, Tableau, Power BI</text>

  <!-- Source: ML Platforms -->
  <rect x="56" y="530" width="160" height="80" rx="6" ry="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
  <g transform="translate(72,548)">
    <circle cx="4" cy="4" r="3.5" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <circle cx="14" cy="4" r="3.5" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <circle cx="9" cy="14" r="3.5" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="7.5" y1="4" x2="10.5" y2="4" stroke="#006DCD" stroke-width="1.2"/>
    <line x1="6" y1="7" x2="8" y2="11" stroke="#006DCD" stroke-width="1.2"/>
    <line x1="12" y1="7" x2="10" y2="11" stroke="#006DCD" stroke-width="1.2"/>
  </g>
  <text x="100" y="554" font-family="'Geist', sans-serif" font-size="11" fill="#1E1E1E" font-weight="600">ML Platforms</text>
  <text x="100" y="568" font-family="'Geist', sans-serif" font-size="9" fill="#767473">SageMaker, MLflow</text>
  <text x="100" y="582" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Feature Stores</text>

  <!-- ============================================================ -->
  <!-- ARROWS: Sources → Ingestion Engine -->
  <!-- ============================================================ -->
  <line x1="216" y1="172" x2="268" y2="172" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="216" y1="236" x2="268" y2="236" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="216" y1="300" x2="268" y2="300" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="216" y1="364" x2="268" y2="364" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="216" y1="428" x2="268" y2="428" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="216" y1="492" x2="268" y2="492" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="216" y1="570" x2="268" y2="570" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>

