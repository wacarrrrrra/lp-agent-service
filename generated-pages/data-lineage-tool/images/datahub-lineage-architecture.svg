  <text x="100" y="424" font-family="'Geist', sans-serif" font-size="11" fill="#1E1E1E" font-weight="600">Redshift</text>
  <text x="100" y="438" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Lineage extraction</text>

  <!-- Source: BI Tools -->
