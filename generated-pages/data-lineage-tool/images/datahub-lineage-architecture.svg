  <rect x="40" y="96" width="192" height="36" rx="8" ry="8" fill="#0A4170"/>
  <rect x="40" y="114" width="192" height="18" fill="#0A4170"/>
  <text x="136" y="119" font-family="'Geist', sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="600" letter-spacing="1">DATA SOURCES</text>

  <!-- Source: Snowflake -->
  <rect x="56" y="146" width="160" height="52" rx="6" ry="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
