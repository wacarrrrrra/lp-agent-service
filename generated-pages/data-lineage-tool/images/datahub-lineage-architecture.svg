  <text x="372" y="119" font-family="'Geist', sans-serif" font-size="11" fill="#3CBBEB" text-anchor="middle" font-weight="600" letter-spacing="1">INGESTION ENGINE</text>

  <!-- Ingestion sub-label -->
  <text x="372" y="148" font-family="'Geist', sans-serif" font-size="10" fill="#B0EAFC" text-anchor="middle">50+ Source Connectors</text>

