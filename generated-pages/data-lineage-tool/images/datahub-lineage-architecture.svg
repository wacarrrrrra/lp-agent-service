<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" role="img">
  <title>DataHub Automated Data Lineage Architecture</title>
  <desc>Technical architecture diagram showing DataHub's automated lineage extraction from multiple sources including Snowflake, BigQuery, dbt, Airflow, and Redshift flowing through the DataHub platform with column-level lineage, multi-hop traversal, and visualization outputs including interactive graphs and impact analysis.</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Castoro&amp;family=Geist:wght@300;400;500;600&amp;display=swap');
    </style>
    <marker id="arrow-right" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3CBBEB"/>
    </marker>
    <marker id="arrow-right-sm" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#3CBBEB"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="100%" height="100%" fill="#F2F1EE"/>

  <!-- Outer frame -->
  <rect x="20" y="20" width="920" height="640" rx="10" ry="10" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.5"/>

  <!-- Header bar -->
  <rect x="20" y="20" width="920" height="56" rx="10" ry="10" fill="#002131"/>
  <rect x="20" y="56" width="920" height="20" fill="#002131"/>
  <text x="48" y="53" font-family="'Castoro', Georgia, serif" font-size="18" fill="#FFFFFF" letter-spacing="0.2">DataHub Automated Data Lineage Architecture</text>
  <text x="848" y="53" font-family="'Geist', sans-serif" font-size="10" fill="#3CBBEB" letter-spacing="1.5" font-weight="500">EXPLAINER</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- COLUMN 1: DATA SOURCES — left tile -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="40" y="96" width="200" height="36" rx="6" ry="6" fill="#0A4170"/>
  <text x="140" y="119" font-family="'Geist', sans-serif" font-size="11" fill="#B0EAFC" text-anchor="middle" letter-spacing="1.2" font-weight="600">DATA SOURCES</text>

  <!-- Source tiles container -->
  <rect x="40" y="140" width="200" height="496" rx="8" ry="8" fill="#F2F1EE" stroke="#B0EAFC" stroke-width="1.2"/>

  <!-- Snowflake tile -->
  <rect x="56" y="156" width="168" height="64" rx="6" ry="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
  <!-- Snowflake icon -->
  <g transform="translate(72, 172)">
    <line x1="10" y1="2" x2="10" y2="18" stroke="#3CBBEB" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="2" y1="6" x2="18" y2="14" stroke="#3CBBEB" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="2" y1="14" x2="18" y2="6" stroke="#3CBBEB" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="10" cy="2" r="2" fill="none" stroke="#3CBBEB" stroke-width="1.4"/>
    <circle cx="10" cy="18" r="2" fill="none" stroke="#3CBBEB" stroke-width="1.4"/>
    <circle cx="2" cy="6" r="2" fill="none" stroke="#3CBBEB" stroke-width="1.4"/>
    <circle cx="18" cy="6" r="2" fill="none" stroke="#3CBBEB" stroke-width="1.4"/>
    <circle cx="2" cy="14" r="2" fill="none" stroke="#3CBBEB" stroke-width="1.4"/>
    <circle cx="18" cy="14" r="2" fill="none" stroke="#3CBBEB" stroke-width="1.4"/>
  </g>
  <text x="104" y="178" font-family="'Geist', sans-serif" font-size="12" fill="#1E1E1E" font-weight="600">Snowflake</text>
  <text x="104" y="193" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Query log parsing</text>
  <text x="104" y="206" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Column lineage</text>

  <!-- BigQuery tile -->
  <rect x="56" y="232" width="168" height="64" rx="6" ry="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
  <!-- BigQuery icon: stacked layers -->
  <g transform="translate(72, 248)">
    <rect x="2" y="6" width="16" height="4" rx="2" fill="none" stroke="#3CBBEB" stroke-width="1.6"/>
    <rect x="2" y="12" width="16" height="4" rx="2" fill="none" stroke="#3CBBEB" stroke-width="1.6"/>
    <ellipse cx="10" cy="6" rx="8" ry="3" fill="none" stroke="#3CBBEB" stroke-width="1.6"/>
  </g>
  <text x="104" y="254" font-family="'Geist', sans-serif" font-size="12" fill="#1E1E1E" font-weight="600">BigQuery</text>
  <text x="104" y="269" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Audit log extraction</text>
  <text x="104" y="282" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Table + column lineage</text>

  <!-- dbt tile -->
  <rect x="56" y="308" width="168" height="64" rx="6" ry="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
  <!-- dbt icon: transform arrows -->
  <g transform="translate(72, 322)">
    <rect x="1" y="5" width="8" height="10" rx="2" fill="none" stroke="#3CBBEB" stroke-width="1.6"/>
    <rect x="11" y="5" width="8" height="10" rx="2" fill="none" stroke="#3CBBEB" stroke-width="1.6"/>
    <line x1="9" y1="10" x2="11" y2="10" stroke="#3CBBEB" stroke-width="1.6" marker-end="url(#arrow-right-sm)"/>
  </g>
  <text x="104" y="330" font-family="'Geist', sans-serif" font-size="12" fill="#1E1E1E" font-weight="600">dbt</text>
  <text x="104" y="345" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Model transformation</text>
  <text x="104" y="358" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Column-level lineage</text>

  <!-- Airflow tile -->
  <rect x="56" y="384" width="168" height="64" rx="6" ry="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
  <!-- Airflow icon: DAG nodes -->
  <g transform="translate(72, 398)">
    <circle cx="4" cy="10" r="3.5" fill="none" stroke="#3CBBEB" stroke-width="1.6"/>
    <circle cx="16" cy="5" r="3.5" fill="none" stroke="#3CBBEB" stroke-width="1.6"/>
    <circle cx="16" cy="15" r="3.5" fill="none" stroke="#3CBBEB" stroke-width="1.6"/>
    <line x1="7" y1="8" x2="13" y2="6" stroke="#3CBBEB" stroke-width="1.4" marker-end="url(#arrow-right-sm)"/>
    <line x1="7" y1="12" x2="13" y2="14" stroke="#3CBBEB" stroke-width="1.4" marker-end="url(#arrow-right-sm)"/>
  </g>
  <text x="104" y="406" font-family="'Geist', sans-serif" font-size="12" fill="#1E1E1E" font-weight="600">Airflow</text>
  <text x="104" y="421" font-family="'Geist', sans-serif" font-size="9" fill="#767473">DAG dependencies</text>
  <text x="104" y="434" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Pipeline lineage</text>

  <!-- Redshift tile -->
  <rect x="56" y="460" width="168" height="64" rx="6" ry="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
  <!-- Redshift icon: cylinder -->
  <g transform="translate(72, 474)">
    <ellipse cx="10" cy="5" rx="8" ry="3" fill="none" stroke="#3CBBEB" stroke-width="1.6"/>
    <line x1="2" y1="5" x2="2" y2="15" stroke="#3CBBEB" stroke-width="1.6"/>
    <line x1="18" y1="5" x2="18" y2="15" stroke="#3CBBEB" stroke-width="1.6"/>
    <ellipse cx="10" cy="15" rx="8" ry="3" fill="none" stroke="#3CBBEB" stroke-width="1.6"/>
  </g>
  <text x="104" y="482" font-family="'Geist', sans-serif" font-size="12" fill="#1E1E1E" font-weight="600">Redshift</text>
  <text x="104" y="497" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Lineage extraction</text>
  <text x="104" y="510" font-family="'Geist', sans-serif" font-size="9" fill="#767473">SQL parsing</text>

  <!-- +45 more sources badge -->
  <rect x="56" y="536" width="168" height="36" rx="6" ry="6" fill="#B0EAFC"/>
  <text x="140" y="549" font-family="'Geist', sans-serif" font-size="10" fill="#002131" text-anchor="middle" font-weight="600">+ 45 MORE SOURCES</text>
  <text x="140" y="563" font-family="'Geist', sans-serif" font-size="9" fill="#0A4170" text-anchor="middle">PostgreSQL · MySQL · Tableau · Looker</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROWS: Sources → Ingestion Layer -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="240" y1="188" x2="290" y2="188" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="240" y1="264" x2="290" y2="264" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="240" y1="340" x2="290" y2="340" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="240" y1="416" x2="290" y2="416" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="240" y1="492" x2="290" y2="492" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- COLUMN 2: INGESTION LAYER -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="290" y="96" width="188" height="36" rx="6" ry="6" fill="#0A4170"/>
  <text x="384" y="119" font-family="'Geist', sans-serif" font-size="11" fill="#B0EAFC" text-anchor="middle" letter-spacing="1.2" font-weight="600">INGESTION LAYER</text>

  <rect x="290" y="140" width="188" height="496" rx="8" ry="8" fill="#F2F1EE" stroke="#B0EAFC" stroke-width="1.2"/>

  <!-- SQL Parser tile -->
  <rect x="306" y="156" width="156" height="72" rx="6" ry="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
  <!-- SQL icon: code brackets -->
  <g transform="translate(316, 170)">
    <text font-family="'Geist', sans-serif" font-size="16" fill="#3CBBEB" font-weight="300">&lt;/&gt;</text>
  </g>
  <text x="346" y="172" font-family="'Geist', sans-serif" font-size="11" fill="#1E1E1E" font-weight="600">SQL Parser</text>
  <text x="346" y="186" font-family="'Geist', sans-serif" font-size="9" fill="#767473">sqlglot-powered</text>
  <text x="346" y="199" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Stored procedures</text>
  <text x="346" y="212" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Query log analysis</text>

  <!-- Audit Log Parser tile -->
  <rect x="306" y="240" width="156" height="72" rx="6" ry="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
  <!-- Log icon: lines -->
  <g transform="translate(316, 254)">
    <rect x="0" y="0" width="18" height="2" rx="1" fill="#3CBBEB"/>
    <rect x="0" y="5" width="14" height="2" rx="1" fill="#3CBBEB"/>
    <rect x="0" y="10" width="18" height="2" rx="1" fill="#3CBBEB"/>
    <rect x="0" y="15" width="10" height="2" rx="1" fill="#3CBBEB"/>
  </g>
  <text x="346" y="256" font-family="'Geist', sans-serif" font-size="11" fill="#1E1E1E" font-weight="600">Audit Log Parser</text>
  <text x="346" y="270" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Cloud warehouse logs</text>
  <text x="346" y="283" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Real-time extraction</text>
  <text x="346" y="296" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Zero config required</text>

  <!-- Metadata Ingestion tile -->
  <rect x="306" y="324" width="156" height="72" rx="6" ry="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
  <!-- Ingestion icon: funnel -->
  <g transform="translate(316, 336)">
    <polygon points="0,0 20,0 14,8 14,18 6,18 6,8" fill="none" stroke="#3CBBEB" stroke-width="1.6" stroke-linejoin="round"/>