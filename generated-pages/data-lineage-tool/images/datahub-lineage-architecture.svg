    <line x1="4" y1="5" x2="14" y2="5" stroke="#006DCD" stroke-width="1.2"/>
    <line x1="4" y1="9" x2="14" y2="9" stroke="#006DCD" stroke-width="1.2"/>
    <line x1="4" y1="13" x2="10" y2="13" stroke="#006DCD" stroke-width="1.2"/>
    <circle cx="15" cy="13" r="3" fill="none" stroke="#3CBBEB" stroke-width="1.2"/>
  </g>
  <text x="330" y="248" font-family="'Geist', sans-serif" font-size="11" fill="#1E1E1E" font-weight="600">Audit Log Parser</text>
  <text x="330" y="262" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Real-time extraction</text>
  <text x="330" y="274" font-family="'Geist', sans-serif" font-size="9" fill="#767473">from warehouse logs</text>

