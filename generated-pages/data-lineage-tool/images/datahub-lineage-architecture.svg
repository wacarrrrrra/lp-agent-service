    <line x1="0" y1="10" x2="16" y2="10" stroke="#006DCD" stroke-width="1.8"/>
    <line x1="1.4" y1="2.9" x2="14.6" y2="17.1" stroke="#006DCD" stroke-width="1.8"/>
    <line x1="14.6" y1="2.9" x2="1.4" y2="17.1" stroke="#006DCD" stroke-width="1.8"/>
  </g>
  <text x="100" y="168" font-family="'Geist', sans-serif" font-size="11" fill="#1E1E1E" font-weight="600">Snowflake</text>
  <text x="100" y="182" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Query log parsing</text>

