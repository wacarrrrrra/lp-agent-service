<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="DataHub is the leading data lineage tool for platform engineers. Automate lineage across 50+ sources, visualize dependencies, and run impact analysis at scale.">
<title>Data Lineage Tool for Platform Engineers | DataHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Castoro:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────────────── */
:root {
  --dh-black:      #000000;
  --dh-off-black:  #161616;
  --dh-neutral-01: #1E1E1E;
  --dh-neutral-02: #3F3F3F;
  --dh-neutral-03: #767473;
  --dh-neutral-04: #B2AEA7;
  --dh-neutral-05: #E3E1D6;
  --dh-off-white:  #F2F1EE;
  --dh-white:      #FFFFFF;
  --dh-blue-01: #002131;
  --dh-blue-02: #0A4170;
  --dh-blue-03: #006DCD;
  --dh-blue-04: #3CBBEB;
  --dh-blue-05: #B0EAFC;
  --dh-green-03: #008070;
  --dh-green-04: #0FC691;
  --dh-green-05: #AAF1BB;
  --font-headline: 'Castoro', Georgia, serif;
  --font-body: 'Geist', 'Helvetica Neue', sans-serif;
  --radius-tile: 8px;
  --radius-card: 10px;
  --radius-pill: 100px;
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-base: 300ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─── RESET ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  color: var(--dh-neutral-02);
  background: var(--dh-off-white);
  overflow-x: hidden;
}
img { max-width: 100%; height: auto; display: block; }
a { text-decoration: none; color: inherit; }
em, i { font-style: normal; }
:focus-visible { outline: 2px solid var(--dh-blue-03); outline-offset: 2px; border-radius: 2px; }

/* ─── SCROLL PROGRESS ─────────────────────────────────────── */
.scroll-prog {
  position: fixed; top: 0; left: 0; width: 0%; height: 2px;
  background: var(--dh-blue-03); z-index: 2000; transition: width 40ms linear;
}

/* ─── LAYOUT ──────────────────────────────────────────────── */
.container { max-width: 1160px; margin: 0 auto; padding: 0 24px; }
.container-narrow { max-width: 800px; margin: 0 auto; padding: 0 24px; }

/* ─── ANIMATION ───────────────────────────────────────────── */
.animate-in {
  transition: opacity 600ms cubic-bezier(0.75, 0, 0.25, 1),
              transform 600ms cubic-bezier(0.75, 0, 0.25, 1);
}
.animate-in.is-hidden { opacity: 0; transform: translateY(24px); }
.animate-in.is-visible { opacity: 1; transform: none; }
.animate-in:nth-child(1) { transition-delay: 0ms; }
.animate-in:nth-child(2) { transition-delay: 80ms; }
.animate-in:nth-child(3) { transition-delay: 160ms; }
.animate-in:nth-child(4) { transition-delay: 240ms; }

/* ─── HEADER ──────────────────────────────────────────────── */
.site-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: var(--dh-off-white);
  border-bottom: 1px solid #DDDBD6;
  transition: box-shadow var(--transition-base);
}
.site-header.scrolled { box-shadow: 0 1px 8px rgba(0,0,0,.06); }
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 68px;
}
.header-logo img { height: 26px; width: auto; }

/* ─── BUTTONS ─────────────────────────────────────────────── */
.button {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 26px;
  font-family: var(--font-body); font-size: 14px; font-weight: 500;
  border-radius: var(--radius-tile); border: none; cursor: pointer;
  white-space: nowrap; text-decoration: none;
  position: relative; overflow: hidden;
}
.button-primary {
  background: var(--dh-blue-03); color: var(--dh-white);
  transition: color var(--transition-fast);
}
.button-primary::before {
  content: ''; position: absolute; inset: 0;
  background: var(--dh-blue-02);
  transform: translateX(-100%);
  transition: transform var(--transition-fast); z-index: 0;
}
.button-primary:hover::before { transform: translateX(0); }
.button-primary span { position: relative; z-index: 1; display: flex; align-items: center; gap: 8px; }
.button-ghost {
  background: transparent; color: var(--dh-neutral-01);
  border: 1.5px solid var(--dh-neutral-04);
  transition: border-color var(--transition-fast), color var(--transition-fast);
}
.button-ghost:hover { border-color: var(--dh-blue-03); color: var(--dh-blue-03); }
.button-inverse {
  background: transparent; color: var(--dh-white);
  border: 1.5px solid rgba(255,255,255,.25);
  transition: background var(--transition-fast);
}
.button-inverse:hover { background: rgba(255,255,255,.08); }
.button-sm { padding: 9px 18px; font-size: 13px; }
.button-lg { padding: 16px 32px; font-size: 15px; }
.btn-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

/* ─── SECTION LABEL ───────────────────────────────────────── */
.sec-label {
  font-size: 10px; font-weight: 600; letter-spacing: .12em;
  text-transform: uppercase; color: var(--dh-blue-03);
  margin-bottom: 10px; display: block;
}
.sec-header { margin-bottom: 56px; }
.sec-header.centered { text-align: center; }
.sec-header.centered p { margin-left: auto; margin-right: auto; }
.sec-header h2 {
  font-family: var(--font-headline);
  font-size: clamp(1.8rem, 3.5vw, 2.6rem);
  color: var(--dh-black); margin-bottom: 14px; line-height: 1.2;
}
.sec-header p {
  font-size: 16px; color: var(--dh-neutral-03);
  max-width: 600px; line-height: 1.65;
}

/* ─── PRODUCT BADGE ──────────────────────────────────────── */
.product-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 14px; background: var(--dh-blue-05);
  border-radius: var(--radius-pill);
  font-size: 12px; font-weight: 600; color: var(--dh-blue-02);
  margin-bottom: 20px;
}
.product-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dh-blue-03); }

/* ─── HERO ────────────────────────────────────────────────── */
.hero {
  padding: 130px 0 80px;
  background: var(--dh-off-white);
  border-bottom: 1px solid var(--dh-neutral-05);
}
.hero-inner {
  display: flex; flex-direction: column; gap: 64px;
}
@media (min-width: 1024px) {
  .hero-inner { flex-direction: row; gap: 72px; align-items: flex-start; }
}
.hero-text { flex: 1; }
.hero-text h1 {
  font-family: var(--font-headline);
  font-size: clamp(2.2rem, 4vw, 3.1rem);
  color: var(--dh-black); line-height: 1.1; margin-bottom: 20px;
  font-style: normal;
}
.hero-sub {
  font-size: 17px; color: var(--dh-neutral-02);
  line-height: 1.65; margin-bottom: 28px; max-width: 520px;
}
.hero-bullets { list-style: none; margin-bottom: 32px; display: flex; flex-direction: column; gap: 10px; }
.hero-bullets li {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 14px; color: var(--dh-neutral-02);
}
.hero-bullets li svg { flex-shrink: 0; color: var(--dh-blue-03); margin-top: 3px; }
.hero-bullets li strong { color: var(--dh-black); font-weight: 600; }
.hero-risk { font-size: 12px; color: var(--dh-neutral-03); margin-top: 10px; }

/* Hero form panel */
.hero-form-panel { flex: 0 0 420px; min-width: 0; }
@media (max-width: 1023px) { .hero-form-panel { flex: none; width: 100%; } }
.form-card {
  background: var(--dh-white);
  border: 1.5px solid var(--dh-neutral-05);
  border-radius: var(--radius-card);
  padding: 36px 32px;
}
.form-card-label {
  font-size: 10px; font-weight: 600; letter-spacing: .12em;
  text-transform: uppercase; color: var(--dh-blue-03); margin-bottom: 8px;
}
.form-card h3 {
  font-family: var(--font-headline);
  font-size: 1.35rem; color: var(--dh-black);
  margin-bottom: 6px; line-height: 1.25; font-style: normal;
}
.form-card p {
  font-size: 13px; color: var(--dh-neutral-03);
  margin-bottom: 24px; line-height: 1.55;
}

/* ─── TRUST STRIP ─────────────────────────────────────────── */
.trust-strip {
  padding: 36px 0;
  background: var(--dh-off-white);
  border-bottom: 1px solid var(--dh-neutral-05);
}
.trust-strip-label {
  text-align: center; font-size: 10px; font-weight: 600;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--dh-neutral-03); margin-bottom: 22px;
}
.marquee { overflow: hidden; position: relative; }
.marquee::before, .marquee::after {
  content: ''; position: absolute; top: 0; bottom: 0; width: 80px; z-index: 2; pointer-events: none;
}
.marquee::before { left: 0; background: linear-gradient(90deg, var(--dh-off-white), transparent); }
.marquee::after { right: 0; background: linear-gradient(90deg, transparent, var(--dh-off-white)); }
.marquee-track {
  display: flex; gap: 52px;
  animation: scroll-logos 30s linear infinite;
}
@keyframes scroll-logos { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.marquee-item {
  flex-shrink: 0; font-family: var(--font-body);
  font-size: 14px; font-weight: 600; color: var(--dh-neutral-03);
  white-space: nowrap; transition: color var(--transition-fast);
  display: flex; align-items: center; gap: 8px;
}
.marquee-item:hover { color: var(--dh-blue-03); }
.marquee-item svg { width: 18px; height: 18px; opacity: .5; }

/* ─── PAGE SECTIONS ───────────────────────────────────────── */
.page-section { padding: 96px 0; }
.page-section-alt { background: var(--dh-white); }
.page-section-dark { background: var(--dh-blue-01); }

/* ─── PROBLEM SECTION ─────────────────────────────────────── */
.problem-grid {
  display: grid; grid-template-columns: 1fr;
  gap: 48px;
}
@media (min-width: 1024px) { .problem-grid { grid-template-columns: 1fr 1fr; gap: 72px; align-items: start; } }
.problem-text h2 {
  font-family: var(--font-headline);
  font-size: clamp(1.7rem, 3vw, 2.3rem);
  color: var(--dh-black); margin-bottom: 18px; line-height: 1.2; font-style: normal;
}
.problem-text p { font-size: 15px; color: var(--dh-neutral-02); line-height: 1.7; margin-bottom: 20px; }
.problem-text p.cost-para {
  font-size: 14px; color: var(--dh-neutral-03); line-height: 1.7;
  border-left: 3px solid var(--dh-blue-04); padding-left: 16px;
}
.pain-list { list-style: none; display: flex; flex-direction: column; gap: 16px; }
.pain-item {
  background: var(--dh-white); border: 1.5px solid var(--dh-neutral-05);
  border-radius: var(--radius-tile); padding: 20px 22px;
  transition: border-color var(--transition-fast);
}
.pain-item:hover { border-color: var(--dh-blue-04); }
.pain-item-title {
  font-size: 14px; font-weight: 600; color: var(--dh-black);
  margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
}
.pain-item-title svg { color: var(--dh-blue-03); flex-shrink: 0; }
.pain-item p { font-size: 13px; color: var(--dh-neutral-02); line-height: 1.6; }

/* ─── SOLUTION SECTION ────────────────────────────────────── */
.solution-intro {
  font-size: 16px; color: var(--dh-neutral-02);
  line-height: 1.7; max-width: 700px; margin-bottom: 56px;
}
.solution-blocks { display: flex; flex-direction: column; gap: 48px; }
.solution-block {
  display: grid; grid-template-columns: 1fr;
  gap: 32px;
}
@media (min-width: 1024px) {
  .solution-block { grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
  .solution-block.reverse { direction: rtl; }
  .solution-block.reverse > * { direction: ltr; }
}
.solution-block-text h3 {
  font-family: var(--font-headline);
  font-size: clamp(1.3rem, 2.5vw, 1.7rem);
  color: var(--dh-black); margin-bottom: 14px; line-height: 1.25; font-style: normal;
}
.solution-block-text p { font-size: 15px; color: var(--dh-neutral-02); line-height: 1.7; margin-bottom: 18px; }
.source-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.source-tag {
  font-size: 12px; font-weight: 500; color: var(--dh-blue-02);
  background: var(--dh-blue-05); border-radius: 4px;
  padding: 4px 10px;
}
.feature-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.feature-list li {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 14px; color: var(--dh-neutral-02);
}
.feature-list li svg { flex-shrink: 0; color: var(--dh-blue-03); margin-top: 3px; }
.solution-block-visual {
  background: var(--dh-off-white);
  border: 1.5px solid var(--dh-neutral-05);
  border-radius: var(--radius-card);
  overflow: hidden; min-height: 200px;
  display: flex; align-items: center; justify-content: center;
}
.solution-block-visual svg { width: 100%; height: auto; }

/* ─── HOW IT WORKS ────────────────────────────────────────── */
.steps-grid {
  display: grid; grid-template-columns: 1fr;
  gap: 24px;
}
@media (min-width: 768px) { .steps-grid { grid-template-columns: repeat(3, 1fr); } }
.step-tile {
  background: var(--dh-white);
  border: 1.5px solid var(--dh-neutral-05);
  border-radius: var(--radius-card);
  padding: 32px 28px;
  position: relative;
  transition: border-color var(--transition-fast), transform 100ms ease-out;
}
.step-tile:hover { border-color: var(--dh-blue-04); transform: translateY(-2px); }
.step-number {
  font-family: var(--font-headline);
  font-size: 2.5rem; color: var(--dh-blue-05);
  line-height: 1; margin-bottom: 16px; font-style: normal;
}
.step-tile h3 {
  font-family: var(--font-headline);
  font-size: 1.15rem; color: var(--dh-black);
  margin-bottom: 12px; line-height: 1.25; font-style: normal;
}
.step-tile p { font-size: 14px; color: var(--dh-neutral-02); line-height: 1.65; }
.step-connector {
  display: none;
}
@media (min-width: 768px) {
  .steps-grid { position: relative; }
}

/* ─── TECHNICAL CREDIBILITY ───────────────────────────────── */
.tech-cred-grid {
  display: grid; grid-template-columns: 1fr;
  gap: 32px;
}
@media (min-width: 1024px) { .tech-cred-grid { grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; } }
.tech-cred-text h2 {
  font-family: var(--font-headline);
  font-size: clamp(1.7rem, 3vw, 2.3rem);
  color: var(--dh-white); margin-bottom: 16px; line-height: 1.2; font-style: normal;
}
.tech-cred-text p { font-size: 15px; color: var(--dh-blue-05); line-height: 1.7; margin-bottom: 24px; }
.tech-spec-group { margin-bottom: 28px; }
.tech-spec-group h4 {
  font-size: 10px; font-weight: 600; letter-spacing: .12em;
  text-transform: uppercase; color: var(--dh-blue-04);
  margin-bottom: 12px;
}
.tech-spec-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.tech-spec-list li {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 14px; color: var(--dh-blue-05); line-height: 1.5;
}
.tech-spec-list li svg { flex-shrink: 0; color: var(--dh-blue-04); margin-top: 3px; }
.tech-stat-tiles {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.tech-stat-tile {
  background: rgba(255,255,255,.05);
  border: 1.5px solid var(--dh-blue-02);
  border-radius: var(--radius-tile);
  padding: 24px 20px;
}
.tech-stat-val {
  font-family: var(--font-headline);
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  color: var(--dh-blue-04); line-height: 1;
  margin-bottom: 8px; font-style: normal;
}
.tech-stat-lbl { font-size: 12px; color: var(--dh-blue-05); line-height: 1.4; font-weight: 500; }
.deploy-badges { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
.deploy-badge {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--dh-blue-02);
  border-radius: var(--radius-tile);
  font-size: 12px; font-weight: 500; color: var(--dh-blue-05);
}
.deploy-badge svg { color: var(--dh-blue-04); }

/* ─── VISUAL SECTION ──────────────────────────────────────── */
.visual-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
}
.visual-item { }
.visual-frame {
  border: 1.5px solid var(--dh-neutral-05);
  border-radius: var(--radius-card);
  overflow: hidden;
  background: var(--dh-white);
}
.visual-frame picture, .visual-frame img { width: 100%; height: auto; display: block; }
.visual-caption {
  padding: 14px 18px;
  font-size: 11px; font-weight: 500; letter-spacing: .06em;
  text-transform: uppercase; color: var(--dh-neutral-03);
  border-top: 1px solid var(--dh-neutral-05);
  line-height: 1.5;
}

/* ─── SOCIAL PROOF ────────────────────────────────────────── */
.rating-bar {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 48px; flex-wrap: wrap;
}
.rating-score {
  font-family: var(--font-headline);
  font-size: 2.2rem; color: var(--dh-blue-03);
  line-height: 1; font-style: normal;
}
.rating-meta { }
.rating-meta p { font-size: 13px; color: var(--dh-neutral-03); line-height: 1.4; }
.rating-meta strong { color: var(--dh-black); font-weight: 600; }
.stars { display: flex; gap: 3px; margin-bottom: 4px; }
.star { width: 14px; height: 14px; color: var(--dh-blue-03); }
.quotes-grid {
  display: grid; grid-template-columns: 1fr;
  gap: 20px; margin-bottom: 48px;
}
@media (min-width: 768px) { .quotes-grid { grid-template-columns: repeat(3, 1fr); } }
.quote-card {
  background: var(--dh-white);
  border: 1.5px solid var(--dh-neutral-05);
  border-radius: var(--radius-card);
  padding: 28px 24px;
  transition: border-color var(--transition-fast), transform 100ms ease-out;
}
.quote-card:hover { border-color: var(--dh-blue-04); transform: translateY(-2px); }
.quote-card blockquote {
  font-family: var(--font-headline);
  font-size: 1rem; color: var(--dh-black);
  line-height: 1.6; font-style: normal;
  margin-bottom: 20px;
}
.quote-card blockquote::before { content: '\201C'; color: var(--dh-blue-04); font-size: 1.4rem; line-height: 0; vertical-align: -0.3em; margin-right: 2px; }
.quote-meta { display: flex; align-items: center; gap: 10px; }
.quote-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--dh-blue-02);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--dh-white); flex-shrink: 0;
}
.quote-attr { }
.quote-attr .name { font-size: 13px; font-weight: 600; color: var(--dh-black); }
.quote-attr .role { font-size: 11px; color: var(--dh-neutral-03); }
.proof-logos {
  display: flex; align-items: center; gap: 32px;
  flex-wrap: wrap; justify-content: center;
  padding: 32px 0; border-top: 1px solid var(--dh-neutral-05);
}
.proof-logo-item {
  font-family: var(--font-body); font-size: 14px; font-weight: 600;
  color: var(--dh-neutral-03); transition: color var(--transition-fast);
}
.proof-logo-item:hover { color: var(--dh-blue-03); }

/* ─── FAQ ─────────────────────────────────────────────────── */
.faq-list { max-width: 780px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
.faq-tile {
  background: var(--dh-white);
  border: 1.5px solid var(--dh-neutral-05);
  border-radius: var(--radius-tile);
  overflow: hidden;
  transition: border-color var(--transition-fast);
}
.faq-tile.open { border-color: var(--dh-blue-04); }
.faq-trigger {
  width: 100%; padding: 20px 22px;
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  font-family: var(--font-body); font-size: 15px; font-weight: 500;
  color: var(--dh-black); background: none; border: none;
  cursor: pointer; text-align: left;
}
.faq-icon {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1.5px solid var(--dh-neutral-04);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all var(--transition-fast);
}
.faq-tile.open .faq-icon {
  background: var(--dh-blue-03); border-color: var(--dh-blue-03);
  transform: rotate(180deg);
}
.faq-icon svg { width: 12px; height: 12px; color: var(--dh-neutral-03); transition: color var(--transition-fast); }
.faq-tile.open .faq-icon svg { color: var(--dh-white); }
.faq-body { max-height: 0; overflow:
