<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img">
  <title>AI Anomaly Detection Workflow</title>
  <desc>A four-stage horizontal workflow showing how DataHub Smart Assertions detect anomalies: Historical Data Collection, ML Pattern Learning, Continuous Monitoring, and Anomaly Alerting, with a feedback loop from Stage 4 back to Stage 2.</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Castoro&amp;family=Geist:wght@300;400;500;600&amp;display=swap');
    </style>
    <marker id="arrow-fwd" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3CBBEB"/>
    </marker>
    <marker id="arrow-feedback" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#767473"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="100%" height="100%" fill="#F2F1EE"/>

  <!-- Outer frame -->
  <rect x="20" y="20" width="920" height="500" rx="10" ry="10" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.5"/>

  <!-- Title -->
  <text x="480" y="58" font-family="'Castoro', Georgia, serif" font-size="18" font-weight="400" fill="#002131" text-anchor="middle">AI Anomaly Detection Workflow</text>
  <text x="480" y="76" font-family="'Geist', sans-serif" font-size="11" font-weight="400" fill="#767473" text-anchor="middle" letter-spacing="0.04em">SMART ASSERTIONS — FOUR-STAGE DETECTION PIPELINE</text>

  <!-- Divider under title -->
  <line x1="44" y1="88" x2="916" y2="88" stroke="#B0EAFC" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STAGE TILES -->
  <!-- Stage 1: Historical Data Collection -->
  <g id="stage-1">
    <rect x="44" y="104" width="196" height="296" rx="8" ry="8" fill="#002131" stroke="none"/>
    <!-- Stage number badge -->
    <rect x="56" y="116" width="22" height="22" rx="4" ry="4" fill="#0A4170"/>
    <text x="67" y="131" font-family="'Geist', sans-serif" font-size="11" font-weight="600" fill="#3CBBEB" text-anchor="middle">1</text>
    <!-- Stage title -->
    <text x="88" y="128" font-family="'Geist', sans-serif" font-size="11" font-weight="600" fill="#B0EAFC" letter-spacing="0.06em">STAGE 1</text>
    <text x="56" y="156" font-family="'Castoro', Georgia, serif" font-size="14" font-weight="400" fill="#FFFFFF">Historical Data</text>
    <text x="56" y="174" font-family="'Castoro', Georgia, serif" font-size="14" font-weight="400" fill="#FFFFFF">Collection</text>

    <!-- Divider -->
    <line x1="56" y1="186" x2="228" y2="186" stroke="#0A4170" stroke-width="1"/>

    <!-- Sub-label -->
    <text x="56" y="204" font-family="'Geist', sans-serif" font-size="10" font-weight="500" fill="#3CBBEB" letter-spacing="0.05em">METADATA INGESTION</text>

    <!-- Icon: database stack -->
    <g transform="translate(56, 216)">
      <ellipse cx="12" cy="6" rx="12" ry="4" fill="none" stroke="#3CBBEB" stroke-width="1.5"/>
      <line x1="0" y1="6" x2="0" y2="18" stroke="#3CBBEB" stroke-width="1.5"/>
      <line x1="24" y1="6" x2="24" y2="18" stroke="#3CBBEB" stroke-width="1.5"/>
      <ellipse cx="12" cy="18" rx="12" ry="4" fill="none" stroke="#3CBBEB" stroke-width="1.5"/>
      <ellipse cx="12" cy="12" rx="12" ry="4" fill="none" stroke="#3CBBEB" stroke-width="1.5"/>
    </g>

    <!-- Bullet items -->
    <text x="56" y="258" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Row Counts</text>
    <text x="56" y="274" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Schema Metadata</text>
    <text x="56" y="290" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Column Metrics</text>

    <!-- Divider -->
    <line x1="56" y1="302" x2="228" y2="302" stroke="#0A4170" stroke-width="1"/>

    <!-- Platform chips -->
    <text x="56" y="318" font-family="'Geist', sans-serif" font-size="9" font-weight="500" fill="#767473" letter-spacing="0.04em">SOURCES</text>
    <rect x="56" y="326" width="52" height="16" rx="3" ry="3" fill="none" stroke="#0A4170" stroke-width="1"/>
    <text x="82" y="337" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB" text-anchor="middle">Snowflake</text>
    <rect x="114" y="326" width="48" height="16" rx="3" ry="3" fill="none" stroke="#0A4170" stroke-width="1"/>
    <text x="138" y="337" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB" text-anchor="middle">BigQuery</text>
    <rect x="56" y="348" width="48" height="16" rx="3" ry="3" fill="none" stroke="#0A4170" stroke-width="1"/>
    <text x="80" y="359" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB" text-anchor="middle">Redshift</text>
    <rect x="110" y="348" width="56" height="16" rx="3" ry="3" fill="none" stroke="#0A4170" stroke-width="1"/>
    <text x="138" y="359" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB" text-anchor="middle">Databricks</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="244" y1="252" x2="268" y2="252" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-fwd)"/>

  <!-- Stage 2: ML Pattern Learning -->
  <g id="stage-2">
    <rect x="272" y="104" width="196" height="296" rx="8" ry="8" fill="#0A4170" stroke="none"/>
    <!-- Stage number badge -->
    <rect x="284" y="116" width="22" height="22" rx="4" ry="4" fill="#002131"/>
    <text x="295" y="131" font-family="'Geist', sans-serif" font-size="11" font-weight="600" fill="#3CBBEB" text-anchor="middle">2</text>
    <!-- Stage title -->
    <text x="316" y="128" font-family="'Geist', sans-serif" font-size="11" font-weight="600" fill="#B0EAFC" letter-spacing="0.06em">STAGE 2</text>
    <text x="284" y="156" font-family="'Castoro', Georgia, serif" font-size="14" font-weight="400" fill="#FFFFFF">ML Pattern</text>
    <text x="284" y="174" font-family="'Castoro', Georgia, serif" font-size="14" font-weight="400" fill="#FFFFFF">Learning</text>

    <!-- Divider -->
    <line x1="284" y1="186" x2="456" y2="186" stroke="#002131" stroke-width="1"/>

    <!-- Sub-label -->
    <text x="284" y="204" font-family="'Geist', sans-serif" font-size="10" font-weight="500" fill="#3CBBEB" letter-spacing="0.05em">SEASONALITY &amp; TREND ANALYSIS</text>

    <!-- Icon: trend line / chart -->
    <g transform="translate(284, 214)">
      <rect x="0" y="0" width="24" height="20" rx="2" ry="2" fill="none" stroke="#3CBBEB" stroke-width="1.5"/>
      <polyline points="3,15 7,10 11,12 16,6 21,8" fill="none" stroke="#3CBBEB" stroke-width="1.5" stroke-linejoin="round"/>
    </g>

    <!-- Bullet items -->
    <text x="284" y="258" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Trains on historical patterns</text>
    <text x="284" y="274" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Learns seasonality &amp; trends</text>
    <text x="284" y="290" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Models statistical variance</text>
    <text x="284" y="306" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Predicts normal behavior</text>

    <!-- Divider -->
    <line x1="284" y1="320" x2="456" y2="320" stroke="#002131" stroke-width="1"/>

    <!-- Model note -->
    <text x="284" y="338" font-family="'Geist', sans-serif" font-size="9" font-weight="500" fill="#767473" letter-spacing="0.04em">MODEL INPUTS</text>
    <text x="284" y="354" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB">Time-series metadata history</text>
    <text x="284" y="368" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB">Confirmed anomaly feedback</text>
    <text x="284" y="382" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB">Rejected anomaly signals</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="472" y1="252" x2="496" y2="252" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-fwd)"/>

  <!-- Stage 3: Continuous Monitoring -->
  <g id="stage-3">
    <rect x="500" y="104" width="196" height="296" rx="8" ry="8" fill="#002131" stroke="none"/>
    <!-- Stage number badge -->
    <rect x="512" y="116" width="22" height="22" rx="4" ry="4" fill="#0A4170"/>
    <text x="523" y="131" font-family="'Geist', sans-serif" font-size="11" font-weight="600" fill="#3CBBEB" text-anchor="middle">3</text>
    <!-- Stage title -->
    <text x="544" y="128" font-family="'Geist', sans-serif" font-size="11" font-weight="600" fill="#B0EAFC" letter-spacing="0.06em">STAGE 3</text>
    <text x="512" y="156" font-family="'Castoro', Georgia, serif" font-size="14" font-weight="400" fill="#FFFFFF">Continuous</text>
    <text x="512" y="174" font-family="'Castoro', Georgia, serif" font-size="14" font-weight="400" fill="#FFFFFF">Monitoring</text>

    <!-- Divider -->
    <line x1="512" y1="186" x2="684" y2="186" stroke="#0A4170" stroke-width="1"/>

    <!-- Sub-label -->
    <text x="512" y="204" font-family="'Geist', sans-serif" font-size="10" font-weight="500" fill="#3CBBEB" letter-spacing="0.05em">SCHEDULED ASSERTION RUNS</text>

    <!-- Icon: clock / schedule -->
    <g transform="translate(512, 214)">
      <circle cx="12" cy="10" r="10" fill="none" stroke="#3CBBEB" stroke-width="1.5"/>
      <line x1="12" y1="10" x2="12" y2="5" stroke="#3CBBEB" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="12" y1="10" x2="16" y2="13" stroke="#3CBBEB" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Bullet items -->
    <text x="512" y="258" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Assertions run on schedule</text>
    <text x="512" y="274" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Hourly, daily cadence</text>
    <text x="512" y="290" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Compares observed vs. predicted</text>
    <text x="512" y="306" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Flags threshold deviations</text>

    <!-- Divider -->
    <line x1="512" y1="320" x2="684" y2="320" stroke="#0A4170" stroke-width="1"/>

    <!-- Assertion types -->
    <text x="512" y="338" font-family="'Geist', sans-serif" font-size="9" font-weight="500" fill="#767473" letter-spacing="0.04em">ASSERTION TYPES</text>
    <rect x="512" y="346" width="52" height="16" rx="3" ry="3" fill="none" stroke="#0A4170" stroke-width="1"/>
    <text x="538" y="357" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB" text-anchor="middle">Freshness</text>
    <rect x="570" y="346" width="44" height="16" rx="3" ry="3" fill="none" stroke="#0A4170" stroke-width="1"/>
    <text x="592" y="357" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB" text-anchor="middle">Volume</text>
    <rect x="512" y="368" width="44" height="16" rx="3" ry="3" fill="none" stroke="#0A4170" stroke-width="1"/>
    <text x="534" y="379" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB" text-anchor="middle">Schema</text>
    <rect x="562" y="368" width="50" height="16" rx="3" ry="3" fill="none" stroke="#0A4170" stroke-width="1"/>
    <text x="587" y="379" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB" text-anchor="middle">Column</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="700" y1="252" x2="724" y2="252" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-fwd)"/>

  <!-- Stage 4: Anomaly Alerting -->
  <g id="stage-4">
    <rect x="728" y="104" width="196" height="296" rx="8" ry="8" fill="#0A4170" stroke="none"/>
    <!-- Stage number badge -->
    <rect x="740" y="116" width="22" height="22" rx="4" ry="4" fill="#002131"/>
    <text x="751" y="131" font-family="'Geist', sans-serif" font-size="11" font-weight="600" fill="#3CBBEB" text-anchor="middle">4</text>
    <!-- Stage title -->
    <text x="772" y="128" font-family="'Geist', sans-serif" font-size="11" font-weight="600" fill="#B0EAFC" letter-spacing="0.06em">STAGE 4</text>
    <text x="740" y="156" font-family="'Castoro', Georgia, serif" font-size="14" font-weight="400" fill="#FFFFFF">Anomaly</text>
    <text x="740" y="174" font-family="'Castoro', Georgia, serif" font-size="14" font-weight="400" fill="#FFFFFF">Alerting</text>

    <!-- Divider -->
    <line x1="740" y1="186" x2="912" y2="186" stroke="#002131" stroke-width="1"/>

    <!-- Sub-label -->
    <text x="740" y="204" font-family="'Geist', sans-serif" font-size="10" font-weight="500" fill="#3CBBEB" letter-spacing="0.05em">SLACK, EVENTBRIDGE, DASHBOARD</text>

    <!-- Icon: bell / alert -->
    <g transform="translate(740, 212)">
      <path d="M12,2 C8.7,2 6,4.7 6,8 L6,14 L4,16 L20,16 L18,14 L18,8 C18,4.7 15.3,2 12,2 Z" fill="none" stroke="#3CBBEB" stroke-width="1.5" stroke-linejoin="round"/>
      <line x1="10" y1="16" x2="14" y2="16" stroke="#3CBBEB" stroke-width="1.5"/>
      <line x1="12" y1="16" x2="12" y2="20" stroke="#3CBBEB" stroke-width="1.5"/>
    </g>

    <!-- Bullet items -->
    <text x="740" y="258" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Deviation exceeds threshold</text>
    <text x="740" y="274" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Alert sent via Slack</text>
    <text x="740" y="290" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">EventBridge notification</text>
    <text x="740" y="306" font-family="'Geist', sans-serif" font-size="10" font-weight="400" fill="#B0EAFC">Logged in Data Health Dashboard</text>

    <!-- Divider -->
    <line x1="740" y1="320" x2="912" y2="320" stroke="#002131" stroke-width="1"/>

    <!-- Output chips -->
    <text x="740" y="338" font-family="'Geist', sans-serif" font-size="9" font-weight="500" fill="#767473" letter-spacing="0.04em">OUTPUTS</text>
    <rect x="740" y="346" width="36" height="16" rx="3" ry="3" fill="none" stroke="#002131" stroke-width="1"/>
    <text x="758" y="357" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB" text-anchor="middle">Slack</text>
    <rect x="782" y="346" width="62" height="16" rx="3" ry="3" fill="none" stroke="#002131" stroke-width="1"/>
    <text x="813" y="357" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB" text-anchor="middle">EventBridge</text>
    <rect x="740" y="368" width="130" height="16" rx="3" ry="3" fill="none" stroke="#002131" stroke-width="1"/>
    <text x="805" y="379" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#3CBBEB" text-anchor="middle">Data Health Dashboard</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- FEEDBACK LOOP: Stage 4 → Stage 2 -->
  <!-- Route: down from Stage 4, across bottom, up to Stage 2 -->

  <!-- Feedback loop path -->
  <!-- Down from Stage 4 bottom center -->
  <line x1="826" y1="400" x2="826" y2="440" stroke="#767473" stroke-width="1.2" stroke-dasharray="5 3"/>
  <!-- Across bottom left to Stage 2 bottom center -->
  <line x1="826" y1="440" x2="370" y2="440" stroke="#767473" stroke-width="1.2" stroke-dasharray="5 3"/>
  <!-- Up to Stage 2 bottom -->
  <line x1="370" y1="440" x2="370" y2="404" stroke="#767473" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow-feedback)"/>

  <!-- Feedback label background -->
  <rect x="440" y="428" width="248" height="22" rx="4" ry="4" fill="#F2F1EE" stroke="#B2AEA7" stroke-width="1"/>
  <!-- Feedback label text -->
  <text x="564" y="443" font-family="'Geist', sans-serif" font-size="9" font-weight="500" fill="#3F3F3F" text-anchor="middle" letter-spacing="0.02em">Feedback Loop: Confirmed/Rejected Anomalies Improve Model</text>

  <!-- Feedback loop endpoint dots -->
  <circle cx="826" cy="400" r="3" fill="#767473"/>
  <circle cx="370" cy="404" r="3" fill="#767473"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BOTTOM LEGEND / FOOTER -->
  <line x1="44" y1="472" x2="916" y2="472" stroke="#E3E1D6" stroke-width="1"/>

  <!-- Legend items -->
  <line x1="56" y1="490" x2="80" y2="490" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-fwd)"/>
  <text x="86" y="494" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#767473">Pipeline flow</text>

  <line x1="180" y1="490" x2="204" y2="490" stroke="#767473" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow-feedback)"/>
  <text x="210" y="494" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#767473">Feedback loop</text>

  <rect x="340" y="483" width="10" height="10" rx="2" ry="2" fill="#002131"/>
  <text x="356" y="494" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#767473">Dark stage</text>

  <rect x="430" y="483" width="10" height="10" rx="2" ry="2" fill="#0A4170"/>
  <text x="446" y="494" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#767473">Rich blue stage</text>

  <text x="916" y="494" font-family="'Geist', sans-serif" font-size="9" font-weight="400" fill="#B2AEA7" text-anchor="end">DataHub Smart Assertions — AI-Powered Data Quality</text>
</svg>