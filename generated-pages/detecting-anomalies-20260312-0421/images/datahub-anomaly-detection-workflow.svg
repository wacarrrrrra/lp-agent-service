<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img">
  <title>DataHub Anomaly Detection Workflow</title>
  <desc>DataHub's AI-powered anomaly detection workflow showing Smart Assertions analyzing data warehouse patterns, detecting four types of anomalies—Volume, Freshness, Column Quality, and Custom SQL—and sending real-time alerts with a continuous feedback loop for model tuning.</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Castoro&amp;family=Geist:wght@300;400;500;600&amp;display=swap');
    </style>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3CBBEB"/>
    </marker>
    <marker id="arrow-blue-sm" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#3CBBEB"/>
    </marker>
    <marker id="arrow-feedback" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#767473"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="100%" height="100%" fill="#F2F1EE"/>

  <!-- Outer frame -->
  <rect x="20" y="20" width="920" height="500" rx="10" ry="10" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.5"/>

  <!-- Header band -->
  <rect x="20" y="20" width="920" height="56" rx="10" ry="10" fill="#002131"/>
  <rect x="20" y="54" width="920" height="22" fill="#002131"/>

  <!-- Header title -->
  <text x="480" y="53" font-family="'Castoro', Georgia, serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-style="normal">DataHub Smart Assertions — Anomaly Detection Workflow</text>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- STEP 1: DATA WAREHOUSE -->
  <!-- ─────────────────────────────────────────────────────── -->
  <g id="step-data-warehouse">
    <rect x="40" y="100" width="148" height="340" rx="8" ry="8" fill="#B0EAFC" stroke="#3CBBEB" stroke-width="1.5"/>
    <!-- Step label -->
    <rect x="40" y="100" width="148" height="28" rx="8" ry="8" fill="#0A4170"/>
    <rect x="40" y="116" width="148" height="12" fill="#0A4170"/>
    <text x="114" y="119" font-family="'Geist', sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.8">DATA SOURCES</text>

    <!-- Snowflake icon -->
    <g transform="translate(90, 152)">
      <rect x="-22" y="-22" width="44" height="44" rx="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
      <line x1="0" y1="-12" x2="0" y2="12" stroke="#0A4170" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-10.4" y1="-6" x2="10.4" y2="6" stroke="#0A4170" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="10.4" y1="-6" x2="-10.4" y2="6" stroke="#0A4170" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="0" cy="-12" r="2.5" fill="#3CBBEB"/>
      <circle cx="0" cy="12" r="2.5" fill="#3CBBEB"/>
      <circle cx="-10.4" cy="-6" r="2.5" fill="#3CBBEB"/>
      <circle cx="10.4" cy="-6" r="2.5" fill="#3CBBEB"/>
      <circle cx="-10.4" cy="6" r="2.5" fill="#3CBBEB"/>
      <circle cx="10.4" cy="6" r="2.5" fill="#3CBBEB"/>
    </g>
    <text x="114" y="192" font-family="'Geist', sans-serif" font-size="10" font-weight="500" fill="#002131" text-anchor="middle">Snowflake</text>

    <!-- BigQuery icon -->
    <g transform="translate(90, 240)">
      <rect x="-22" y="-22" width="44" height="44" rx="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
      <polygon points="0,-14 12,7 -12,7" fill="none" stroke="#0A4170" stroke-width="1.8" stroke-linejoin="round"/>
      <line x1="0" y1="-14" x2="0" y2="7" stroke="#3CBBEB" stroke-width="1.2"/>
      <line x1="-12" y1="7" x2="12" y2="7" stroke="#3CBBEB" stroke-width="1.2"/>
    </g>
    <text x="114" y="280" font-family="'Geist', sans-serif" font-size="10" font-weight="500" fill="#002131" text-anchor="middle">BigQuery</text>

    <!-- Redshift icon -->
    <g transform="translate(90, 328)">
      <rect x="-22" y="-22" width="44" height="44" rx="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
      <ellipse cx="0" cy="-4" rx="12" ry="5" fill="none" stroke="#0A4170" stroke-width="1.8"/>
      <line x1="-12" y1="-4" x2="-12" y2="8" stroke="#0A4170" stroke-width="1.8"/>
      <line x1="12" y1="-4" x2="12" y2="8" stroke="#0A4170" stroke-width="1.8"/>
      <path d="M-12,8 Q0,14 12,8" fill="none" stroke="#0A4170" stroke-width="1.8"/>
    </g>
    <text x="114" y="368" font-family="'Geist', sans-serif" font-size="10" font-weight="500" fill="#002131" text-anchor="middle">Redshift</text>

    <!-- Databricks icon -->
    <g transform="translate(90, 410)">
      <rect x="-22" y="-22" width="44" height="44" rx="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
      <polygon points="0,-14 13,0 0,14 -13,0" fill="none" stroke="#0A4170" stroke-width="1.8" stroke-linejoin="round"/>
      <line x1="-13" y1="0" x2="13" y2="0" stroke="#3CBBEB" stroke-width="1.2"/>
    </g>
    <text x="114" y="450" font-family="'Geist', sans-serif" font-size="10" font-weight="500" fill="#002131" text-anchor="middle">Databricks</text>
  </g>

  <!-- Arrow: Data Sources → Smart Assertions -->
  <line x1="189" y1="270" x2="218" y2="270" stroke="#3CBBEB" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- STEP 2: SMART ASSERTIONS / ML ENGINE -->
  <!-- ─────────────────────────────────────────────────────── -->
  <g id="step-smart-assertions">
    <rect x="222" y="100" width="196" height="340" rx="8" ry="8" fill="#0A4170" stroke="#3CBBEB" stroke-width="1.5"/>
    <rect x="222" y="100" width="196" height="28" rx="8" ry="8" fill="#002131"/>
    <rect x="222" y="116" width="196" height="12" fill="#002131"/>
    <text x="320" y="119" font-family="'Geist', sans-serif" font-size="10" font-weight="600" fill="#3CBBEB" text-anchor="middle" letter-spacing="0.8">SMART ASSERTIONS</text>

    <!-- Central ML brain icon -->
    <g transform="translate(320, 185)">
      <circle cx="0" cy="0" r="32" fill="#002131" stroke="#3CBBEB" stroke-width="1.5"/>
      <!-- Neural net nodes -->
      <circle cx="-14" cy="-10" r="4" fill="none" stroke="#3CBBEB" stroke-width="1.4"/>
      <circle cx="14" cy="-10" r="4" fill="none" stroke="#3CBBEB" stroke-width="1.4"/>
      <circle cx="0" cy="0" r="4" fill="none" stroke="#B0EAFC" stroke-width="1.4"/>
      <circle cx="-14" cy="10" r="4" fill="none" stroke="#3CBBEB" stroke-width="1.4"/>
      <circle cx="14" cy="10" r="4" fill="none" stroke="#3CBBEB" stroke-width="1.4"/>
      <!-- Connections -->
      <line x1="-10" y1="-10" x2="-4" y2="0" stroke="#3CBBEB" stroke-width="1"/>
      <line x1="10" y1="-10" x2="4" y2="0" stroke="#3CBBEB" stroke-width="1"/>
      <line x1="-10" y1="10" x2="-4" y2="0" stroke="#3CBBEB" stroke-width="1"/>
      <line x1="10" y1="10" x2="4" y2="0" stroke="#3CBBEB" stroke-width="1"/>
      <line x1="-10" y1="-10" x2="10" y2="-10" stroke="#3CBBEB" stroke-width="0.8" stroke-dasharray="2 2"/>
      <line x1="-10" y1="10" x2="10" y2="10" stroke="#3CBBEB" stroke-width="0.8" stroke-dasharray="2 2"/>
    </g>
    <text x="320" y="232" font-family="'Geist', sans-serif" font-size="11" font-weight="600" fill="#B0EAFC" text-anchor="middle">ML Inference Engine</text>

    <!-- Feature list -->
    <rect x="238" y="248" width="164" height="22" rx="4" fill="#002131"/>
    <text x="246" y="263" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB">&#x25B8;</text>
    <text x="258" y="263" font-family="'Geist', sans-serif" font-size="9" fill="#B0EAFC">Learns historical patterns</text>

    <rect x="238" y="276" width="164" height="22" rx="4" fill="#002131"/>
    <text x="246" y="291" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB">&#x25B8;</text>
    <text x="258" y="291" font-family="'Geist', sans-serif" font-size="9" fill="#B0EAFC">Seasonality-aware</text>

    <rect x="238" y="304" width="164" height="22" rx="4" fill="#002131"/>
    <text x="246" y="319" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB">&#x25B8;</text>
    <text x="258" y="319" font-family="'Geist', sans-serif" font-size="9" fill="#B0EAFC">Auto-tunes thresholds</text>

    <rect x="238" y="332" width="164" height="22" rx="4" fill="#002131"/>
    <text x="246" y="347" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB">&#x25B8;</text>
    <text x="258" y="347" font-family="'Geist', sans-serif" font-size="9" fill="#B0EAFC">Audit log + watermark</text>

    <rect x="238" y="360" width="164" height="22" rx="4" fill="#002131"/>
    <text x="246" y="375" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB">&#x25B8;</text>
    <text x="258" y="375" font-family="'Geist', sans-serif" font-size="9" fill="#B0EAFC">Bulk creation via dashboard</text>

    <rect x="238" y="388" width="164" height="22" rx="4" fill="#002131"/>
    <text x="246" y="403" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB">&#x25B8;</text>
    <text x="258" y="403" font-family="'Geist', sans-serif" font-size="9" fill="#B0EAFC">SDK / GraphQL API access</text>

    <rect x="238" y="416" width="164" height="22" rx="4" fill="#002131"/>
    <text x="246" y="431" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB">&#x25B8;</text>
    <text x="258" y="431" font-family="'Geist', sans-serif" font-size="9" fill="#B0EAFC">In-network execution</text>
  </g>

  <!-- Arrow: Smart Assertions → Anomaly Types -->
  <line x1="419" y1="270" x2="448" y2="270" stroke="#3CBBEB" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- STEP 3: ANOMALY TYPES -->
  <!-- ─────────────────────────────────────────────────────── -->
  <g id="step-anomaly-types">
    <rect x="452" y="100" width="196" height="340" rx="8" ry="8" fill="#F2F1EE" stroke="#3CBBEB" stroke-width="1.5"/>
    <rect x="452" y="100" width="196" height="28" rx="8" ry="8" fill="#0A4170"/>
    <rect x="452" y="116" width="196" height="12" fill="#0A4170"/>
    <text x="550" y="119" font-family="'Geist', sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.8">ANOMALY TYPES</text>

    <!-- Volume tile -->
    <rect x="466" y="140" width="168" height="68" rx="6" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.2"/>
    <g transform="translate(488, 168)">
      <rect x="-14" y="-14" width="28" height="28" rx="4" fill="#B0EAFC"/>
      <rect x="-8" y="2" width="5" height="8" fill="#0A4170"/>
      <rect x="-2" y="-4" width="5" height="14" fill="#0A4170"/>
      <rect x="4" y="-8" width="5" height="18" fill="#3CBBEB"/>
      <line x1="-10" y1="-10" x2="10" y2="-10" stroke="#0A4170" stroke-width="1" stroke-dasharray="2 1"/>
    </g>
    <text x="514" y="158" font-family="'Geist', sans-serif" font-size="11" font-weight="600" fill="#002131">Volume</text>
    <text x="514" y="172" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Unexpected row count</text