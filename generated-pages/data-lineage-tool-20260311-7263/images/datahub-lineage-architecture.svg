<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" role="img">
  <title>DataHub Automated Data Lineage Architecture</title>
  <desc>Technical architecture diagram showing DataHub's automated lineage extraction from multiple sources including Snowflake, BigQuery, dbt, Airflow, and Redshift flowing through the DataHub platform with column-level lineage, multi-hop traversal, and visualization outputs including interactive graphs and impact analysis.</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Castoro&amp;family=Geist:wght@300;400;500;600&amp;display=swap');
    </style>
    <marker id="arrow-right" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3CBBEB"/>
    </marker>
    <marker id="arrow-down" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#3CBBEB"/>
    </marker>
    <marker id="arrow-right-sm" markerWidth="6" markerHeight="6" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L6,2.5 z" fill="#3CBBEB"/>
    </marker>
  </defs>

  <!-- Page background -->
  <rect width="100%" height="100%" fill="#F2F1EE"/>

  <!-- Outer frame -->
  <rect x="20" y="20" width="920" height="640" rx="10" ry="10" fill="#FFFFFF" stroke="#3CBBEB" stroke-width="1.5"/>

  <!-- Header bar -->
  <rect x="20" y="20" width="920" height="52" rx="10" ry="10" fill="#002131"/>
  <rect x="20" y="52" width="920" height="20" fill="#002131"/>
  <text x="480" y="52" font-family="'Castoro', Georgia, serif" font-size="18" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">DataHub Automated Data Lineage Architecture</text>

  <!-- ============================================================ -->
  <!-- COLUMN 1: DATA SOURCES (left panel) -->
  <!-- ============================================================ -->
  <rect x="40" y="92" width="190" height="30" rx="4" ry="4" fill="#0A4170"/>
  <text x="135" y="112" font-family="'Geist', sans-serif" font-size="10" font-weight="600" fill="#B0EAFC" text-anchor="middle" letter-spacing="1.2">DATA SOURCES</text>

  <!-- Source tiles -->
  <!-- Snowflake -->
  <rect x="40" y="132" width="190" height="52" rx="6" ry="6" fill="#F2F1EE" stroke="#3CBBEB" stroke-width="1.2"/>
  <!-- Snowflake icon -->
  <g transform="translate(60, 152)">
    <circle cx="10" cy="10" r="9" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="10" y1="3" x2="10" y2="17" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="3" y1="10" x2="17" y2="10" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="5" y1="5" x2="15" y2="15" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="15" y1="5" x2="5" y2="15" stroke="#006DCD" stroke-width="1.5"/>
  </g>
  <text x="88" y="153" font-family="'Geist', sans-serif" font-size="12" font-weight="600" fill="#1E1E1E">Snowflake</text>
  <text x="88" y="168" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Query log parsing</text>

  <!-- BigQuery -->
  <rect x="40" y="194" width="190" height="52" rx="6" ry="6" fill="#F2F1EE" stroke="#3CBBEB" stroke-width="1.2"/>
  <g transform="translate(60, 214)">
    <rect x="2" y="2" width="16" height="16" rx="2" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="7" y1="2" x2="7" y2="18" stroke="#006DCD" stroke-width="1.2"/>
    <line x1="13" y1="2" x2="13" y2="18" stroke="#006DCD" stroke-width="1.2"/>
    <line x1="2" y1="10" x2="18" y2="10" stroke="#006DCD" stroke-width="1.2"/>
  </g>
  <text x="88" y="215" font-family="'Geist', sans-serif" font-size="12" font-weight="600" fill="#1E1E1E">BigQuery</text>
  <text x="88" y="230" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Audit log extraction</text>

  <!-- Redshift -->
  <rect x="40" y="256" width="190" height="52" rx="6" ry="6" fill="#F2F1EE" stroke="#3CBBEB" stroke-width="1.2"/>
  <g transform="translate(60, 276)">
    <ellipse cx="10" cy="10" rx="9" ry="6" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="1" y1="10" x2="19" y2="10" stroke="#006DCD" stroke-width="1.2"/>
    <line x1="10" y1="4" x2="10" y2="16" stroke="#006DCD" stroke-width="1.2"/>
  </g>
  <text x="88" y="277" font-family="'Geist', sans-serif" font-size="12" font-weight="600" fill="#1E1E1E">Redshift</text>
  <text x="88" y="292" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Lineage extraction</text>

  <!-- dbt -->
  <rect x="40" y="318" width="190" height="52" rx="6" ry="6" fill="#F2F1EE" stroke="#3CBBEB" stroke-width="1.2"/>
  <g transform="translate(60, 338)">
    <rect x="1" y="5" width="18" height="10" rx="2" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="5" y1="5" x2="5" y2="1" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="10" y1="5" x2="10" y2="1" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="15" y1="5" x2="15" y2="1" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="5" y1="15" x2="5" y2="19" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="10" y1="15" x2="10" y2="19" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="15" y1="15" x2="15" y2="19" stroke="#006DCD" stroke-width="1.5"/>
  </g>
  <text x="88" y="339" font-family="'Geist', sans-serif" font-size="12" font-weight="600" fill="#1E1E1E">dbt</text>
  <text x="88" y="354" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Models + column lineage</text>

  <!-- Airflow -->
  <rect x="40" y="380" width="190" height="52" rx="6" ry="6" fill="#F2F1EE" stroke="#3CBBEB" stroke-width="1.2"/>
  <g transform="translate(60, 400)">
    <circle cx="4" cy="10" r="3" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <circle cx="16" cy="4" r="3" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="3" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <line x1="7" y1="9" x2="13" y2="5" stroke="#006DCD" stroke-width="1.2" marker-end="url(#arrow-right-sm)"/>
    <line x1="7" y1="11" x2="13" y2="15" stroke="#006DCD" stroke-width="1.2" marker-end="url(#arrow-right-sm)"/>
  </g>
  <text x="88" y="401" font-family="'Geist', sans-serif" font-size="12" font-weight="600" fill="#1E1E1E">Airflow</text>
  <text x="88" y="416" font-family="'Geist', sans-serif" font-size="9" fill="#767473">DAG dependencies</text>

  <!-- BI Tools -->
  <rect x="40" y="442" width="190" height="52" rx="6" ry="6" fill="#F2F1EE" stroke="#3CBBEB" stroke-width="1.2"/>
  <g transform="translate(60, 462)">
    <rect x="1" y="8" width="5" height="11" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <rect x="8" y="4" width="5" height="15" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <rect x="15" y="1" width="5" height="18" fill="none" stroke="#006DCD" stroke-width="1.5"/>
  </g>
  <text x="88" y="463" font-family="'Geist', sans-serif" font-size="12" font-weight="600" fill="#1E1E1E">BI Tools</text>
  <text x="88" y="478" font-family="'Geist', sans-serif" font-size="9" fill="#767473">Looker, Tableau, Power BI</text>

  <!-- ML Platforms -->
  <rect x="40" y="504" width="190" height="52" rx="6" ry="6" fill="#F2F1EE" stroke="#3CBBEB" stroke-width="1.2"/>
  <g transform="translate(60, 524)">
    <circle cx="10" cy="10" r="4" fill="none" stroke="#006DCD" stroke-width="1.5"/>
    <circle cx="2" cy="4" r="2" fill="none" stroke="#006DCD" stroke-width="1.2"/>
    <circle cx="18" cy="4" r="2" fill="none" stroke="#006DCD" stroke-width="1.2"/>
    <circle cx="2" cy="16" r="2" fill="none" stroke="#006DCD" stroke-width="1.2"/>
    <circle cx="18" cy="16" r="2" fill="none" stroke="#006DCD" stroke-width="1.2"/>
    <line x1="4" y1="5" x2="7" y2="8" stroke="#006DCD" stroke-width="1"/>
    <line x1="16" y1="5" x2="13" y2="8" stroke="#006DCD" stroke-width="1"/>
    <line x1="4" y1="15" x2="7" y2="12" stroke="#006DCD" stroke-width="1"/>
    <line x1="16" y1="15" x2="13" y2="12" stroke="#006DCD" stroke-width="1"/>
  </g>
  <text x="88" y="525" font-family="'Geist', sans-serif" font-size="12" font-weight="600" fill="#1E1E1E">ML Platforms</text>
  <text x="88" y="540" font-family="'Geist', sans-serif" font-size="9" fill="#767473">SageMaker, MLflow</text>

  <!-- Source count badge -->
  <rect x="40" y="568" width="190" height="28" rx="4" ry="4" fill="#B0EAFC"/>
  <text x="135" y="587" font-family="'Geist', sans-serif" font-size="10" font-weight="600" fill="#002131" text-anchor="middle">50+ CONNECTORS SUPPORTED</text>

  <!-- ============================================================ -->
  <!-- ARROWS: Sources → Ingestion Engine -->
  <!-- ============================================================ -->
  <line x1="230" y1="158" x2="310" y2="230" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="230" y1="220" x2="310" y2="260" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="230" y1="282" x2="310" y2="290" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="230" y1="344" x2="310" y2="320" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="230" y1="406" x2="310" y2="350" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="230" y1="468" x2="310" y2="380" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <line x1="230" y1="530" x2="310" y2="410" stroke="#3CBBEB" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <!-- ============================================================ -->
  <!-- COLUMN 2: DATAHUB PLATFORM (center) -->
  <!-- ============================================================ -->
  <!-- Platform outer tile -->
  <rect x="300" y="92" width="360" height="540" rx="8" ry="8" fill="#002131" stroke="#3CBBEB" stroke-width="1.5"/>

  <!-- Platform header -->
  <rect x="300" y="92" width="360" height="40" rx="8" ry="8" fill="#0A4170"/>
  <rect x="300" y="112" width="360" height="20" fill="#0A4170"/>
  <text x="480" y="117" font-family="'Castoro', Georgia, serif" font-size="15" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">DataHub Platform</text>

  <!-- Ingestion Engine tile -->
  <rect x="318" y="144" width="324" height="88" rx="6" ry="6" fill="#0A4170" stroke="#3CBBEB" stroke-width="1"/>
  <text x="480" y="164" font-family="'Geist', sans-serif" font-size="10" font-weight="600" fill="#B0EAFC" text-anchor="middle" letter-spacing="1">INGESTION ENGINE</text>
  <!-- Ingestion sub-items -->
  <rect x="328" y="172" width="96" height="48" rx="4" ry="4" fill="#002131" stroke="#3CBBEB" stroke-width="0.8"/>
  <text x="376" y="191" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB" text-anchor="middle">SQL Parser</text>
  <text x="376" y="204" font-family="'Geist', sans-serif" font-size="9" fill="#767473" text-anchor="middle">sqlglot engine</text>

  <rect x="432" y="172" width="96" height="48" rx="4" ry="4" fill="#002131" stroke="#3CBBEB" stroke-width="0.8"/>
  <text x="480" y="191" font-family="'Geist', sans-serif" font-size="9" fill="#3CBBEB" text-anchor="middle">Audit Log</text>
  <text x="480" y="204" font-family="'Geist', sans-serif" font-size="9" fill="#767473" text-anchor="middle">Parser