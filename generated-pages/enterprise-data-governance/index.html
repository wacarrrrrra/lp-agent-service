<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="DataHub's enterprise data governance platform gives data leaders policy enforcement, lineage, and compliance controls across every source. Join a live demo.">
<title>Enterprise Data Governance | DataHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Castoro:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────────────── */
:root {
  --color-surface-default: #F2F1EE;
  --color-surface-subtle:  #E3E1D6;
  --color-surface-white:   #FFFFFF;
  --color-surface-dark:    #002131;
  --color-surface-dark-deeper: #001828;
  --color-text-primary:    #000000;
  --color-text-secondary:  #3F3F3F;
  --color-text-muted:      #767473;
  --color-text-inverse:    #FFFFFF;
  --color-blue-01: #002131;
  --color-blue-02: #0A4170;
  --color-blue-03: #006DCD;
  --color-blue-04: #3CBBEB;
  --color-blue-05: #B0EAFC;
  --color-green-03: #008070;
  --color-green-04: #0FC691;
  --color-green-05: #AAF1BB;
  --color-neutral-02: #3F3F3F;
  --color-neutral-03: #767473;
  --color-neutral-04: #B2AEA7;
  --color-neutral-05: #E3E1D6;
  --color-off-white: #F2F1EE;
  --color-basic-black: #000000;
  --color-basic-white: #FFFFFF;
  --color-border-default: #E3E1D6;
  --color-border-active:  #006DCD;
  --color-border-dark:    #0A4170;
  --font-headline: 'Castoro', Georgia, serif;
  --font-body: 'Geist', 'Helvetica Neue', Arial, sans-serif;
  --radius-tile: 8px;
  --radius-card: 10px;
  --radius-pill: 100px;
}

/* ─── RESET ───────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);font-size:16px;line-height:1.6;color:var(--color-text-secondary);background:var(--color-surface-default);overflow-x:hidden}
img{max-width:100%;height:auto;display:block}
a{text-decoration:none;color:inherit}
:focus-visible{outline:2px solid var(--color-blue-03);outline-offset:2px;border-radius:2px}

/* ─── SCROLL PROGRESS ─────────────────────────────────────── */
.scroll-prog{position:fixed;top:0;left:0;width:0%;height:2px;background:var(--color-blue-03);z-index:2000;transition:width 40ms linear}

/* ─── LAYOUT ──────────────────────────────────────────────── */
.container{max-width:1160px;margin:0 auto;padding:0 24px}
.container-narrow{max-width:800px;margin:0 auto;padding:0 24px}
main{display:flex;flex-direction:column;gap:60px}
@media(min-width:1024px){main{gap:120px}}

/* ─── ANIMATION — THREE TIERS ─────────────────────────────── */
/* Tier 1: hover — 100ms ease-out (on elements directly) */
/* Tier 2: nav — 300ms cubic-bezier(0.75,0,0.25,1) */
/* Tier 3: scroll-on — 600ms cubic-bezier(0.75,0,0.25,1) */
.animate-in{
  transition:opacity 600ms cubic-bezier(0.75,0,0.25,1),
             transform 600ms cubic-bezier(0.75,0,0.25,1);
}
.animate-in.is-hidden{opacity:0;transform:translateY(24px)}
.animate-in.is-visible{opacity:1;transform:none}
.animate-in:nth-child(1){transition-delay:0ms}
.animate-in:nth-child(2){transition-delay:80ms}
.animate-in:nth-child(3){transition-delay:160ms}
.animate-in:nth-child(4){transition-delay:240ms}

/* ─── BUTTONS ─────────────────────────────────────────────── */
.button{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;font-family:var(--font-body);font-size:14px;font-weight:500;border-radius:var(--radius-tile);border:none;cursor:pointer;white-space:nowrap;text-decoration:none;position:relative;overflow:hidden}
/* Primary — 150ms roll-over */
.button-primary{background:var(--color-blue-03);color:var(--color-basic-white);transition:color 150ms ease-out}
.button-primary::before{content:'';position:absolute;inset:0;background:var(--color-blue-02);transform:translateX(-100%);transition:transform 150ms ease-out;z-index:0}
.button-primary:hover::before{transform:translateX(0)}
.button-primary span{position:relative;z-index:1;display:flex;align-items:center;gap:8px}
.button-ghost{background:transparent;color:var(--color-text-primary);border:1.5px solid var(--color-neutral-04);transition:border-color 100ms ease-out,color 100ms ease-out}
.button-ghost:hover{border-color:var(--color-blue-03);color:var(--color-blue-03)}
.button-inverse{background:transparent;color:var(--color-basic-white);border:1.5px solid rgba(255,255,255,.25);transition:background 100ms ease-out}
.button-inverse:hover{background:rgba(255,255,255,.08)}
.button-sm{padding:9px 18px;font-size:13px}
.button-lg{padding:16px 32px;font-size:15px}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}

/* ─── SECTION LABEL ───────────────────────────────────────── */
.sec-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--color-blue-03);margin-bottom:10px;display:block}
.sec-header{margin-bottom:56px}
.sec-header.centered{text-align:center}
.sec-header.centered p{margin-left:auto;margin-right:auto}
.sec-header h2{font-family:var(--font-headline);font-size:clamp(1.8rem,3.5vw,2.6rem);color:var(--color-text-primary);margin-bottom:14px;line-height:1.2}
.sec-header p{font-size:16px;color:var(--color-text-muted);max-width:600px;line-height:1.65}

/* ─── NAV ─────────────────────────────────────────────────── */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(242,241,238,.93);backdrop-filter:blur(10px);border-bottom:1px solid transparent;transition:border-color 300ms cubic-bezier(0.75,0,0.25,1),box-shadow 300ms cubic-bezier(0.75,0,0.25,1)}
.nav.scrolled{border-bottom-color:var(--color-neutral-05);box-shadow:0 1px 8px rgba(0,0,0,.06)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px}
.nav-logo img{height:26px;width:auto}
.nav-links{display:none;align-items:center;gap:32px}
@media(min-width:1024px){.nav-links{display:flex}}
.nav-top{font-size:14px;font-weight:400;color:var(--color-text-secondary);position:relative;padding:3px 0;transition:color 100ms ease-out}
.nav-top::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1.5px;background:var(--color-blue-03);transition:width 100ms ease-out}
.nav-top:hover{color:var(--color-blue-03)}
.nav-top:hover::after{width:100%}
.nav-cta{display:flex;align-items:center;gap:10px}

/* ─── HERO ────────────────────────────────────────────────── */
.hero{padding:130px 0 72px;background:var(--color-surface-white);border-bottom:1px solid var(--color-border-default)}
.hero-inner{display:flex;flex-direction:column;gap:48px}
@media(min-width:1024px){.hero-inner{flex-direction:row;gap:72px;align-items:center}}
.hero-text{flex:1}
.hero-text h1{font-family:var(--font-headline);font-size:clamp(2.2rem,4vw,3.2rem);color:var(--color-text-primary);line-height:1.1;margin-bottom:20px}
.hero-text h1 em{font-style:normal;color:var(--color-blue-03)}
.hero-sub{font-size:17px;color:var(--color-text-secondary);line-height:1.65;margin-bottom:28px;max-width:500px}
.hero-bullets{list-style:none;margin-bottom:32px;display:flex;flex-direction:column;gap:9px}
.hero-bullets li{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--color-text-secondary)}
.hero-bullets li svg{flex-shrink:0;color:var(--color-blue-03);margin-top:3px}
/* Hero visual — architecture diagram framed */
.hero-visual{flex:1;min-width:0}
.framed-image{border:1.5px solid var(--color-border-default);border-radius:var(--radius-card);overflow:hidden;background:var(--color-surface-white)}
.framed-image img{width:100%;height:auto;display:block}
.framed-image figcaption{padding:12px 16px;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-muted);border-top:1px solid var(--color-border-default)}

/* ─── LOGO SCROLLER ──────────────────────────────────────── */
.logo-scroller{padding:40px 0;background:var(--color-surface-default);border-bottom:1px solid var(--color-border-default)}
.logo-scroller-label{text-align:center;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:22px}
.marquee{overflow:hidden;position:relative}
.marquee::before,.marquee::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2;pointer-events:none}
.marquee::before{left:0;background:linear-gradient(90deg,var(--color-surface-default),transparent)}
.marquee::after{right:0;background:linear-gradient(90deg,transparent,var(--color-surface-default))}
.marquee-track{display:flex;gap:52px;animation:scroll-logos 30s linear infinite}
@keyframes scroll-logos{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.marquee-item{flex-shrink:0;font-family:var(--font-body);font-size:14px;font-weight:600;color:var(--color-neutral-03);white-space:nowrap;transition:color 100ms ease-out}
.marquee-item:hover{color:var(--color-blue-03)}

/* ─── HOVER TILE GRID ────────────────────────────────────── */
.hover-tile-grid-section{padding:0}
.hover-tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(min-width:1024px){.hover-tile-grid{grid-template-columns:repeat(4,1fr)}}
.hover-tile{background:var(--color-surface-dark);border:1.5px solid var(--color-border-dark);border-radius:var(--radius-card);padding:28px 24px;position:relative;overflow:hidden;transition:border-color 100ms ease-out}
.hover-tile::before{content:'';position:absolute;inset:0;background:var(--color-blue-03);opacity:0;transition:opacity 100ms ease-out;z-index:0}
.hover-tile:hover{border-color:var(--color-blue-04)}
.hover-tile:hover::before{opacity:.07}
.hover-tile-content{position:relative;z-index:1}
.hover-tile-icon{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--color-blue-02);display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:var(--color-blue-04)}
.hover-tile h4{font-family:var(--font-headline);font-size:16px;color:var(--color-basic-white);margin-bottom:10px;line-height:1.25}
.hover-tile p{font-size:13px;color:var(--color-blue-05);line-height:1.6}

/* ─── CONTENT HIGHLIGHT ──────────────────────────────────── */
.content-highlight{padding:0}
.content-highlight-inner{display:flex;flex-direction:column;gap:40px}
@media(min-width:1024px){.content-highlight-inner{flex-direction:row;gap:72px;align-items:center}}
.content-highlight-inner.reverse{flex-direction:column}
@media(min-width:1024px){.content-highlight-inner.reverse{flex-direction:row-reverse}}
.ch-text{flex:1}
.ch-text h2{font-family:var(--font-headline);font-size:clamp(1.6rem,3vw,2.2rem);color:var(--color-text-primary);margin-bottom:14px;line-height:1.2}
.ch-text p{font-size:15px;color:var(--color-text-secondary);line-height:1.65;margin-bottom:22px}
.feature-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.feature-list li{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--color-text-secondary)}
.feature-list li svg{flex-shrink:0;color:var(--color-blue-03);margin-top:3px}
.ch-visual{flex:1;min-width:0}

/* ─── LIST TITLE (Integration Architecture) ──────────────── */
.list-title-section{background:var(--color-surface-white);border-radius:var(--radius-card);border:1.5px solid var(--color-border-default);padding:48px}
.list-title-grid{display:grid;grid-template-columns:1fr;gap:32px}
@media(min-width:1024px){.list-title-grid{grid-template-columns:repeat(3,1fr)}}
.list-item-group h4{font-family:var(--font-headline);font-size:17px;color:var(--color-text-primary);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.list-item-group h4 svg{color:var(--color-blue-03);flex-shrink:0}
.list-item{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--color-text-secondary);margin-bottom:8px;line-height:1.5}
.list-item svg{flex-shrink:0;color:var(--color-blue-04);margin-top:3px}

/* ─── CUSTOMER FACTS ─────────────────────────────────────── */
.customer-facts{background:var(--color-surface-dark);border-radius:var(--radius-card);padding:56px 48px}
.customer-facts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:32px}
@media(min-width:1024px){.customer-facts-grid{grid-template-columns:repeat(4,1fr)}}
.fact{text-align:center}
.fact-val{font-family:var(--font-headline);font-size:clamp(2rem,4vw,2.8rem);color:var(--color-blue-04);line-height:1;margin-bottom:8px}
.fact-lbl{font-size:12px;color:var(--color-blue-05);font-weight:500;line-height:1.4}

/* ─── QUOTE ──────────────────────────────────────────────── */
.quote-section{padding:0}
.quote-inner{background:var(--color-surface-white);border:1.5px solid var(--color-border-default);border-radius:var(--radius-card);padding:48px;display:grid;grid-template-columns:1fr;gap:32px}
@media(min-width:1024px){.quote-inner{grid-template-columns:1fr 2fr;gap:48px;align-items:start}}
.quote-co{font-family:var(--font-headline);font-size:26px;color:var(--color-blue-01);margin-bottom:8px}
.quote-co-role{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:20px}
.quote-result{background:var(--color-surface-default);border-radius:6px;padding:14px 16px}
.quote-result-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--color-blue-03);margin-bottom:5px}
.quote-result-val{font-family:var(--font-headline);font-size:14px;color:var(--color-text-primary)}
blockquote{font-family:var(--font-headline);font-size:clamp(1.1rem,2vw,1.4rem);color:var(--color-text-primary);line-height:1.55;font-style:normal;margin-bottom:24px}
.quote-author{display:flex;align-items:center;gap:12px}
.quote-avatar{width:40px;height:40px;border-radius:50%;background:var(--color-blue-02);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--color-basic-white);flex-shrink:0}
.quote-name{font-size:14px;font-weight:600;color:var(--color-text-primary)}
.quote-role{font-size:12px;color:var(--color-text-muted)}

/* ─── FAQ ────────────────────────────────────────────────── */
.faq-section{padding:0}
.faq-tile-list{max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.faq-tile{background:var(--color-surface-white);border:1.5px solid var(--color-border-default);border-radius:var(--radius-tile);overflow:hidden;transition:border-color 100ms ease-out}
.faq-tile.open{border-color:var(--color-blue-04)}
.faq-header{width:100%;padding:20px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;font-family:var(--font-body);font-size:15px;font-weight:500;color:var(--color-text-primary);background:none;border:none;cursor:pointer;text-align:left}
.faq-icon{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--color-neutral-04);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 100ms ease-out}
.faq-tile.open .faq-icon{background:var(--color-blue-03);border-color:var(--color-blue-03);transform:rotate(180deg)}
.faq-icon svg{width:12px;height:12px;color:var(--color-text-muted);transition:color 100ms ease-out}
.faq-tile.open .faq-icon svg{color:var(--color-basic-white)}
.faq-answer{max-height:0;overflow:hidden;transition:max-height 300ms cubic-bezier(0.75,0,0.25,1)}
.faq-tile.open .faq-answer{max-height:400px}
.faq-answer-inner{padding:0 22px 22px;font-size:14px;color:var(--color-text-secondary);line-height:1.7}

/* ─── FRAME CTA ──────────────────────────────────────────── */
.frame-cta{background:var(--color-blue-01);border-radius:var(--radius-card);padding:72px 48px;text-align:center}
.frame-cta h2{font-family:var(--font-headline);font-size:clamp(1.9rem,3.5vw,2.7rem);color:var(--color-basic-white);margin-bottom:16px;line-height:1.2}
.frame-cta p{font-size:16px;color:var(--color-blue-05);margin-bottom:36px;line-height:1.65;max-width:580px;margin-left:auto;margin-right:auto}
.frame-cta .btn-row{justify-content:center;margin-bottom:36px}
.cta-trust{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
.cta-trust-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--color-blue-05)}
.cta-trust-item svg{color:var(--color-blue-04)}
.demo-chip{margin-top:32px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:var(--radius-tile);padding:16px 22px;display:inline-flex;align-items:center;gap:12px}
.demo-chip svg{color:var(--color-blue-04);flex-shrink:0}
.demo-chip p{font-size:13px;color:var(--color-blue-05);text-align:left}
.demo-chip strong{color:var(--color-basic-white)}

/* ─── PRODUCT BADGE ──────────────────────────────────────── */
.product-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;background:var(--color-blue-05);border-radius:var(--radius-pill);font-size:12px;font-weight:600;color:var(--color-blue-02);margin-bottom:20px}
.product-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--color-blue-03)}

/* ─── FOOTER ─────────────────────────────────────────────── */
.dh-footer{font-family:var(--font-body);background-color:var(--color-surface-dark);border:1.5px solid var(--color-border-dark);border-radius:var(--radius-card)}
.dh-footer__main{display:flex;flex-direction:column;gap:18px;padding:32px 32px 40px}
@media(min-width:1024px){.dh-footer__main{flex-direction:row}}
.dh-footer__brand{display:flex;flex-direction:column;gap:20px;min-width:160px;flex-shrink:0}
.dh-footer__logo img{height:22px;width:auto}
.dh-footer__social{display:flex;gap:14px;align-items:center}
.dh-footer__social a{color:var(--color-blue-04);transition:color 100ms ease-out}
.dh-footer__social a:hover{color:var(--color-blue-05)}
.dh-footer__social svg{width:18px;height:18px;fill:currentColor}
.dh-footer__nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;flex:1}
@media(min-width:1024px){.dh-footer__nav-grid{grid-template-columns:repeat(4,1fr)}}
.dh-footer__nav-col h3{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--color-blue-05);margin:0 0 14px}
.dh-footer__nav-col ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.dh-footer__nav-col li a{font-size:13px;font-weight:400;color:var(--color-blue-04);text-decoration:none;transition:color 100ms ease-out}
.dh-footer__nav-col li a:hover{color:var(--color-basic-white)}
.dh-footer__bottom{background-color:var(--color-surface-dark-deeper);border-top:1px solid var(--color-border-dark);border-radius:0 0 8px 8px;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;flex-wrap:wrap;gap:12px}
.dh-footer__copyright{font-size:12px;color:var(--color-neutral-03);margin:0}
.dh-footer__legal{display:flex;gap:20px}
.dh-footer__legal a{font-size:12px;color:var(--color-neutral-03);text-decoration:none;transition:color 100ms ease-out}
.dh-footer__legal a:hover{color:var(--color-basic-white)}

/* ─── MOBILE CTA ─────────────────────────────────────────── */
.mobile-cta{display:none;position:fixed;bottom:0;left:0;right:0;padding:14px 20px;background:rgba(242,241,238,.97);backdrop-filter:blur(10px);border-top:1px solid var(--color-neutral-05);z-index:999}
@media(max-width:768px){.mobile-cta{display:block}}
.mobile-cta .button{width:100%;justify-content:center}

/* ─── HUBSPOT FORM ───────────────────────────────────────── */
.hs-form-section{background:var(--color-surface-white);border:1.5px solid var(--color-border-default);border-radius:var(--radius-card);padding:48px;max-width:640px;margin:0 auto}
.hs-form-section h3{font-family:var(--font-headline);font-size:1.6rem;color:var(--color-text-primary);margin-bottom:8px}
.hs-form-section p{font-size:14px;color:var(--color-text-muted);margin-bottom:28px}
</style>
<style>
:root {
  --dh-black:      #000000;
  --dh-off-black:  #161616;
  --dh-neutral-01: #1E1E1E;
  --dh-neutral-02: #3F3F3F;
  --dh-neutral-03: #767473;
  --dh-neutral-04: #B2AEA7;
  --dh-neutral-05: #E3E1D6;
  --dh-off-white:  #F2F1EE;
  --dh-white:      #FFFFFF;
  --dh-blue-01: #002131;
  --dh-blue-02: #0A4170;
  --dh-blue-03: #006DCD;
  --dh-blue-04: #3CBBEB;
  --dh-blue-05: #B0EAFC;
  --dh-green-01: #0A261E;
  --dh-green-02: #004843;
  --dh-green-03: #008070;
  --dh-green-04: #0FC691;
  --dh-green-05: #AAF1BB;
  --dh-magenta-01: #40002D;
  --dh-magenta-02: #7F004B;
  --dh-magenta-03: #CB3276;
  --dh-magenta-04: #FF85CE;
  --dh-magenta-05: #FCD6E4;
  --dh-orange-01: #3B0F00;
  --dh-orange-02: #820D00;
  --dh-orange-03: #D23500;
  --dh-orange-04: #EC9E32;
  --dh-orange-05: #F5E0A7;
  --font-headline: 'Castoro', Georgia, serif;
  --font-body:     'Geist', 'Helvetica Neue', sans-serif;
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-base: 300ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
  --radius-tile: 8px;
  --radius-card: 10px;
  --radius-pill: 100px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);font-size:16px;line-height:1.6;color:var(--dh-neutral-02);background:var(--dh-off-white);overflow-x:hidden}
img{max-width:100%;height:auto;display:block}
a{text-decoration:none;color:inherit}
:focus-visible{outline:2px solid var(--dh-blue-03);outline-offset:2px;border-radius:2px}

.scroll-prog{position:fixed;top:0;left:0;width:0%;height:2px;background:var(--dh-blue-03);z-index:2000;transition:width 40ms linear}

.container{max-width:1160px;margin:0 auto;padding:0 24px}
.container-narrow{max-width:820px;margin:0 auto;padding:0 24px}

.animate-in{
  transition:opacity 600ms cubic-bezier(0.75,0,0.25,1),transform 600ms cubic-bezier(0.75,0,0.25,1);
}
.animate-in.is-hidden{opacity:0;transform:translateY(24px)}
.animate-in.is-visible{opacity:1;transform:none}
.animate-in:nth-child(1){transition-delay:0ms}
.animate-in:nth-child(2){transition-delay:80ms}
.animate-in:nth-child(3){transition-delay:160ms}
.animate-in:nth-child(4){transition-delay:240ms}
.animate-in:nth-child(5){transition-delay:320ms}

/* ── BUTTONS ── */
.button{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;font-family:var(--font-body);font-size:14px;font-weight:500;border-radius:var(--radius-tile);border:none;cursor:pointer;white-space:nowrap;text-decoration:none;position:relative;overflow:hidden;font-style:normal}
.button-primary{background:var(--dh-blue-03);color:var(--dh-white);transition:color var(--transition-fast)}
.button-primary::before{content:'';position:absolute;inset:0;background:var(--dh-blue-02);transform:translateX(-100%);transition:transform var(--transition-fast);z-index:0}
.button-primary:hover::before{transform:translateX(0)}
.button-primary span{position:relative;z-index:1;display:flex;align-items:center;gap:8px}
.button-ghost{background:transparent;color:var(--dh-neutral-01);border:1.5px solid var(--dh-neutral-04);transition:border-color var(--transition-fast),color var(--transition-fast)}
.button-ghost:hover{border-color:var(--dh-blue-03);color:var(--dh-blue-03)}
.button-inverse{background:transparent;color:var(--dh-white);border:1.5px solid rgba(255,255,255,.25);transition:background var(--transition-fast)}
.button-inverse:hover{background:rgba(255,255,255,.08)}
.button-sm{padding:9px 18px;font-size:13px}
.button-lg{padding:16px 32px;font-size:15px}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}

/* ── SECTION LABEL ── */
.sec-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--dh-blue-03);margin-bottom:10px;display:block;font-style:normal}
.sec-header{margin-bottom:52px}
.sec-header.centered{text-align:center}
.sec-header.centered p{margin-left:auto;margin-right:auto}
.sec-header h2{font-family:var(--font-headline);font-size:clamp(1.8rem,3.5vw,2.6rem);color:var(--dh-black);margin-bottom:14px;line-height:1.2;font-style:normal}
.sec-header p{font-size:16px;color:var(--dh-neutral-03);max-width:600px;line-height:1.65}

/* ── HEADER ── */
.site-header{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(242,241,238,.95);backdrop-filter:blur(10px);border-bottom:1px solid #DDDBD6;transition:box-shadow var(--transition-base)}
.site-header.scrolled{box-shadow:0 1px 8px rgba(0,0,0,.07)}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:68px}
.header-logo img{height:26px;width:auto;display:block}

/* ── HERO ── */
.hero{padding:120px 0 0;background:var(--dh-off-white)}
.hero-inner{display:grid;grid-template-columns:1fr;gap:0}
@media(min-width:1024px){.hero-inner{grid-template-columns:1fr 1fr;gap:72px;align-items:start}}
.hero-text{padding-bottom:56px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;background:var(--dh-blue-05);border-radius:var(--radius-pill);font-size:12px;font-weight:600;color:var(--dh-blue-02);margin-bottom:22px;font-style:normal}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--dh-blue-03);flex-shrink:0}
.hero-text h1{font-family:var(--font-headline);font-size:clamp(2.1rem,3.8vw,3rem);color:var(--dh-black);line-height:1.1;margin-bottom:20px;font-style:normal}
.hero-sub{font-size:17px;color:var(--dh-neutral-02);line-height:1.65;margin-bottom:28px;max-width:520px}
.hero-bullets{list-style:none;margin-bottom:32px;display:flex;flex-direction:column;gap:10px}
.hero-bullets li{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--dh-neutral-02)}
.hero-bullets li svg{flex-shrink:0;color:var(--dh-blue-03);margin-top:3px}
.hero-risk{font-size:12px;color:var(--dh-neutral-03);margin-top:14px;line-height:1.5}
.hero-form-panel{background:var(--dh-white);border:1.5px solid var(--dh-neutral-05);border-bottom:none;border-radius:var(--radius-card) var(--radius-card) 0 0;padding:36px 36px 40px;align-self:end}
@media(max-width:1023px){.hero-form-panel{border-radius:var(--radius-card);border:1.5px solid var(--dh-neutral-05);margin-bottom:40px}}
.hero-form-panel h3{font-family:var(--font-headline);font-size:1.25rem;color:var(--dh-black);margin-bottom:6px;font-style:normal}
.hero-form-panel p{font-size:13px;color:var(--dh-neutral-03);margin-bottom:22px;line-height:1.55}

/* ── TRUST STRIP ── */
.trust-strip{background:var(--dh-off-white);border-top:1px solid var(--dh-neutral-05);border-bottom:1px solid var(--dh-neutral-05);padding:28px 0}
.trust-strip-label{text-align:center;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--dh-neutral-03);margin-bottom:18px}
.trust-logos{display:flex;align-items:center;justify-content:center;gap:40px;flex-wrap:wrap}
.trust-logo-item{font-family:var(--font-body);font-size:14px;font-weight:600;color:var(--dh-neutral-04);letter-spacing:.04em;transition:color var(--transition-fast)}
.trust-logo-item:hover{color:var(--dh-blue-03)}

/* ── PROBLEM SECTION ── */
.problem-section{padding:80px 0}
.problem-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:40px}
@media(min-width:768px){.problem-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1024px){.problem-grid{grid-template-columns:repeat(4,1fr)}}
.problem-card{background:var(--dh-white);border:1.5px solid var(--dh-neutral-05);border-radius:var(--radius-card);padding:28px 24px;position:relative;overflow:hidden;transition:border-color var(--transition-fast)}
.problem-card:hover{border-color:var(--dh-blue-04)}
.problem-card-icon{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--dh-neutral-05);display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:var(--dh-blue-03)}
.problem-card h4{font-family:var(--font-headline);font-size:15px;color:var(--dh-black);margin-bottom:10px;line-height:1.3;font-style:normal}
.problem-card p{font-size:13px;color:var(--dh-neutral-03);line-height:1.6}
.problem-cost{background:var(--dh-blue-01);border-radius:var(--radius-card);padding:40px 48px;margin-top:40px}
.problem-cost p{font-size:16px;color:var(--dh-blue-05);line-height:1.7;max-width:720px}
.problem-cost p strong{color:var(--dh-white);font-weight:600}

/* ── SOLUTION SECTION ── */
.solution-section{padding:80px 0;background:var(--dh-white)}
.solution-items{display:flex;flex-direction:column;gap:0}
.solution-item{display:grid;grid-template-columns:1fr;gap:40px;padding:56px 0;border-bottom:1px solid var(--dh-neutral-05)}
.solution-item:last-child{border-bottom:none}
@media(min-width:1024px){.solution-item{grid-template-columns:1fr 1fr;gap:80px;align-items:center}}
.solution-item.reverse{}
@media(min-width:1024px){.solution-item.reverse .solution-item-visual{order:-1}}
.solution-item-text h3{font-family:var(--font-headline);font-size:clamp(1.4rem,2.5vw,1.9rem);color:var(--dh-black);margin-bottom:14px;line-height:1.2;font-style:normal}
.solution-item-text p{font-size:15px;color:var(--dh-neutral-02);line-height:1.7;margin-bottom:18px}
.solution-item-text p:last-child{margin-bottom:0}
.solution-item-visual{background:var(--dh-off-white);border:1.5px solid var(--dh-neutral-05);border-radius:var(--radius-card);padding:32px;display:flex;align-items:center;justify-content:center;min-height:200px}
.solution-visual-inner{width:100%}
.solution-icon-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sol-chip{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;background:var(--dh-white);border:1.5px solid var(--dh-neutral-05);border-radius:var(--radius-tile);font-size:12px;font-weight:500;color:var(--dh-neutral-02)}
.sol-chip svg{color:var(--dh-blue-03);flex-shrink:0}
.sol-chip.active{border-color:var(--dh-blue-04);background:var(--dh-blue-05);color:var(--dh-blue-02)}
.sol-policy-block{background:var(--dh-white);border:1.5px solid var(--dh-neutral-05);border-radius:var(--radius-tile);padding:16px 18px;margin-bottom:10px}
.sol-policy-block:last-child{margin-bottom:0}
.sol-policy-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dh-blue-03);margin-bottom:6px}
.sol-policy-val{font-size:13px;color:var(--dh-neutral-02);font-weight:500}
.sol-lineage-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sol-lineage-node{background:var(--dh-white);border:1.5px solid var(--dh-neutral-05);border-radius:6px;padding:8px 12px;font-size:11px;font-weight:500;color:var(--dh-neutral-02);white-space:nowrap}
.sol-lineage-node.highlight{border-color:var(--dh-blue-04);background:var(--dh-blue-05);color:var(--dh-blue-02)}
.sol-lineage-arrow{color:var(--dh-blue-04);flex-shrink:0}
.sol-quality-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--dh-neutral-05)}
.sol-quality-row:last-child{border-bottom:none}
.sol-quality-name{font-size:12px;color:var(--dh-neutral-02);font-weight:500}
.sol-quality-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--radius-pill)}
.sol-quality-status.pass{background:var(--dh-green-05);color:var(--dh-green-02)}
.sol-quality-status.warn{background:var(--dh-orange-05);color:var(--dh-orange-02)}
.sol-glossary-term{background:var(--dh-white);border:1.5px solid var(--dh-neutral-05);border-radius:var(--radius-tile);padding:14px 16px;margin-bottom:10px}
.sol-glossary-term:last-child{margin-bottom:0}
.sol-glossary-term-name{font-size:13px;font-weight:600;color:var(--dh-blue-02);margin-bottom:4px}
.sol-glossary-term-def{font-size:12px;color:var(--dh-neutral-03);line-height:1.5}

/* ── HOW IT WORKS ── */
.how-section{padding:80px 0}
.how-steps{display:grid;grid-template-columns:1fr;gap:0;margin-top:48px;border:1.5px solid var(--dh-neutral-05);border-radius:var(--radius-card);overflow:hidden;background:var(--dh-white)}
@media(min-width:1024px){.how-steps{grid-template-columns:repeat(3,1fr)}}
.how-step{padding:40px 36px;border-bottom:1.5px solid var(--dh-neutral-05);position:relative}
@media(min-width:1024px){.how-step{border-bottom:none;border-right:1.5px solid var(--dh-neutral-05)}}
.how-step:last-child{border-bottom:none;border-right:none}
.how-step-num{font-family:var(--font-headline);font-size:2.5rem;color:var(--dh-blue-05);line-height:1;margin-bottom:16px;font-style:normal}
.how-step h3{font-family:var(--font-headline);font-size:1.2rem;color:var(--dh-black);margin-bottom:12px;font-style:normal}
.how-step p{font-size:14px;color:var(--dh-neutral-03);line-height:1.65}
.how-step-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--dh-blue-03);margin-bottom:8px;display:block}

/* ── TECHNICAL CREDIBILITY ── */
.tech-section{padding:80px 0;background:var(--dh-white)}
.capability-table-wrap{overflow-x:auto;margin-top:40px}
.capability-table{width:100%;border-collapse:collapse;font-size:14px}
.capability-table th{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dh-neutral-03);padding:12px 20px;text-align:left;border-bottom:2px solid var(--dh-neutral-05);background:var(--dh-off-white)}
.capability-table td{padding:16px 20px;border-bottom:1px solid var(--dh-neutral-05);vertical-align:top;color:var(--dh-neutral-02);line-height:1.55}
.capability-table td:first-child{font-weight:600;color:var(--dh-black);white-space:nowrap;width:220px}
.capability-table tr:last-child td{border-bottom:none}
.capability-table tr:hover td{background:var(--dh-off-white)}
.tech-deploy{display:grid;grid-template-columns:1fr;gap:16px;margin-top:32px}
@media(min-width:768px){.tech-deploy{grid-template-columns:1fr 1fr}}
.tech-deploy-card{background:var(--dh-off-white);border:1.5px solid var(--dh-neutral-05);border-radius:var(--radius-card);padding:28px 24px}
.tech-deploy-card h4{font-family:var(--font-headline);font-size:1rem;color:var(--dh-black);margin-bottom:8px;font-style:normal}
.tech-deploy-card p{font-size:13px;color:var(--dh-neutral-03);line-height:1.6}

/* ── VISUAL SECTION ── */
.visual-section{padding:80px 0}
.visual-grid{display:grid;grid-template-columns:1fr;gap:40px;margin-top:48px}
.visual-figure{background:var(--dh-white);border:1.5px solid var(--dh-neutral-05);border-radius:var(--radius-card);overflow:hidden}
.visual-figure svg{width:100%;height:auto;display:block}
.visual-figure figcaption{padding:14px 20px;font-size:12px;color:var(--dh-neutral-03);border-top:1px solid var(--dh-neutral-05);line-height:1.55}

/* ── SOCIAL PROOF ── */
.social-section{padding:80px 0;background:var(--dh-white)}
.quotes-grid{display:grid;grid-template-columns:1fr;gap:20px;margin-top:48px}
@media(min-width:768px){.quotes-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1024px){.quotes-grid{grid-template-columns:repeat(3,1fr)}}
.quote-card{background:var(--dh-off-white);border:1.5px solid var(--dh-neutral-05);border-radius:var(--radius-card);padding:32px 28px;display:flex;flex-direction:column;gap:20px;transition:border-color var(--transition-fast)}
.quote-card:hover{border-color:var(--dh-blue-04)}
.quote-card blockquote{font-family:var(--font-headline);font-size:1rem;color:var(--dh-black);line-height:1.6;font-style:normal;flex:1}
.quote-card-meta{display:flex;align-items:center;gap:12px}
.quote-avatar{width:38px;height:38px;border-radius:50%;background:var(--dh-blue-02);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--dh-white);flex-shrink:0}
.quote-name{font-size:13px;font-weight:600;color:var(--dh-black)}
.quote-role{font-size:11px;color:var(--dh-neutral-03);line-height:1.4}
.quote-source{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dh-blue-03);margin-top:4px}
.rating-bar{display:flex;align-items:center;gap:16px;margin-top:40px;padding:24px 28px;background:var(--dh-off-white);border:1.5px solid var(--dh-neutral-05);border-radius:var(--radius-card)}
.rating-val{font-family:var(--font-headline);font-size:2rem;color:var(--dh-blue-03);font-style:normal}
.rating-detail{font-size:13px;color:var(--dh-neutral-03);line-height:1.5}
.rating-detail strong{color:var(--dh-black);font-weight:600}

/* ── FAQ ── */
.faq-section{padding:80px 0}
.faq-list{max-width:780px;margin:48px auto 0;display:flex;flex-direction:column;gap:8px}
.faq-tile{background:var(--dh-white);border:1.5px solid var(--dh-neutral-05);border-radius:var(--radius-tile);overflow:hidden;transition:border-color var(--transition-fast)}
.faq-tile.open{border-color:var(--dh-blue-04)}
.faq-trigger{width:100%;padding:20px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;font-family:var(--font-body);font-size:15px;font-weight:500;color:var(--dh-black);background:none;border:none;cursor:pointer;text-align:left;font-style:normal}
.faq-icon{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--dh-neutral-04);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--transition-fast)}
.faq-tile.open .faq-icon{background:var(--dh-blue-03);border-color:var(--dh-blue-03);transform:rotate(180deg)}
.faq-icon svg{width:12px;height:12px;color:var(--dh-neutral-03);transition:color var(--transition-fast)}
.faq-tile.open .faq-icon svg{color:var(--dh-white)}
.faq-body{max-height:0;overflow:hidden;transition:max-height var(--transition-base)}
.faq-tile.open .faq-body{max-height:500px}
.faq-body-inner{padding:0 22px 22px;font-size:14px;color:var(--dh-neutral-02);line-height:1.75}

/* ── FINAL CTA ── */
.final-cta-section{padding:80px 0}
.final-cta-inner{background:var(--dh-blue-01);border-radius:var(--radius-card);padding:72px 48px;display:grid;grid-template-columns:1fr;gap:48px}
@media(min-width:1024px){.final-cta-inner{grid-template-columns:1fr 1fr;gap:72px;align-items:start}}
.final-cta-text h2{font-family:var(--font-headline);font-size:clamp(1.8rem,3vw,2.4rem);color:var(--dh-white);margin-bottom:16px;line-height:1.2;font-style:normal}
.final-cta-text p{font-size:15px;color:var(--dh-blue-05);line-height:1.7;margin-bottom:24px}
.final-cta-text .btn-row{margin-bottom:16px}
.final-risk{font-size:12px;color:var(--dh-blue-05);opacity:.8;line-height:1.5}
.final-trust{display:flex;flex-direction:column;gap:12px;margin-top:28px}
.final-trust-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dh-blue-05)}
.final-trust-item svg{color:var(--dh-blue-04);flex-shrink:0}
.final-form-panel{background:var(--dh-white);border-radius:var(--radius-card);padding:36px}
.final-form-panel h3{font-family:var(--font-headline);font-size:1.2rem;color:var(--dh-black);margin-bottom:6px;font-style:normal}
.final-form-panel p{font-size:13px;color:var(--dh-neutral-03);margin-bottom:22px;line-height:1.55}

/* ── FOOTER ── */
.dh-footer{font-family:var(--font-body);background-color:var(--dh-blue-01);border:1.5px solid var(--dh-blue-02);border-radius:var(--radius-card);margin:0 24px 24px}
.dh-footer__main{display:flex;flex-direction:column;gap:18px;padding:32px 32px 40px}
@media(min-width:1024px){.dh-footer
